dotes_y_clase:
  - nombre: Escuela de magia (Conjuración)
    descripcion: "Conjuro adicional preparado por nivel de conjuro de conjuración."
  - nombre: Escuelas opuestas
    descripcion: "Adivinación y Encantamiento cuestan 2 espacios."
  - nombre: Inscribir pergamino
    descripcion: "Crear pergaminos de conjuros conocidos."
  - nombre: Dureza
    descripcion: "+3 PG +1 PG por nivel."
  - nombre: Iniciativa mejorada
    descripcion: "+4 iniciativa."
  - nombre: Escuela especialista (Teletransporte)
    descripcion: "Otorga poderes de desplazamiento."
  - nombre: Alerta
    descripcion: "+2 Percepción y Averiguar Intenciones (familiar cuervo)."
  - nombre: Estudiante veloz
    descripcion: "Reduce tiempo de copia de conjuros."
  - nombre: Conjuros penetrantes
    descripcion: "+2 vs resistencia a conjuros."
  - nombre: Conjuros penetrantes mayores
    descripcion: "+4 total vs resistencia a conjuros."
  - nombre: Conjurar en combate
    descripcion: "+4 concentración defensiva."
  - nombre: Soltura con escuela (Conjuración)
    descripcion: "+1 CD conjuros de conjuración."

aptitudes:
  encantamiento_del_convocador:
    tipo: capacidad de clase (Conjuración)
    descripcion: >
      Los conjuros de convocación (subescuela de conjuración) que lanzas tienen una duración aumentada.
      Añades 1/2 de tu nivel de mago en asaltos adicionales a la duración base del conjuro.
    nivel_actual: "+4 asaltos"

  desplazamiento:
    tipo: poder de escuela (Teletransporte)
    accion: rápida
    alcance: "5 pies por cada 2 niveles"
    distancia_actual: "20 pies"
    usos_dia: 10
    descripcion: >
      Puedes teletransportarte instantáneamente a un punto visible dentro del alcance.
      Este movimiento no provoca ataques de oportunidad.
      Debes tener línea de visión y línea de efecto hacia el destino.

  paso_dimensional:
    tipo: poder de escuela (Teletransporte)
    accion: rápida
    alcance: "30 pies por nivel"
    distancia_actual: "270 pies"
    usos_dia: 1
    descripcion: >
      Puedes teletransportarte como si lanzaras dimension door.
      Este desplazamiento no provoca ataques de oportunidad.
      Tras usar esta habilidad, no puedes realizar más acciones hasta tu siguiente turno,
      igual que con el conjuro dimension door.

  heroe_de_korvosa:
    tipo: rasgo de campaña
    descripcion: >
      Obtienes un bonificador +2 a las pruebas de Intimidar, Engañar y Diplomacia.

equipo:
  - nombre: Capa de resistencia +2
    efecto: "+2 a todas las salvaciones"
  - nombre: Amuleto de armadura natural +1
    efecto: "+1 CA natural"
  - nombre: Anillo de protección +1
    efecto: "+1 CA desvío"
  - nombre: Anillo de sustento
    efecto: "No necesita comer/beber y descansa en 2h"
  - nombre: Máscara de la peste
    efecto: >
