  - nombre: Imagen múltiple
    alias_en_ingles: Mirror Image
    nivel: 2
    escuela: illusion
    subescuela: quimera
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: personal
    objetivo: tú
    efecto:
    area:
    duracion: 1 min./nivel
    cancelable: false
    tirada_de_salvacion:
    resistencia_a_conjuros:
    descripcion: |-
      Este conjuro crea un número de dobles ilusorios de ti mismo que se posicionan en tu casilla. Estos dobles dificultan que los enemigos te localicen con precisión y te ataquen.
      Al lanzar imagen múltiple se crean 1d4 imágenes más una por cada tres niveles de lanzador (máximo 8 imágenes en total).
      Estas imágenes permanecen en tu espacio y se mueven contigo, imitando tus movimientos, sonidos y acciones con exactitud. Cuando seas atacado o seas el objetivo de un conjuro que requiera una tirada de ataque, hay una posibilidad de que el ataque golpee a una de tus imágenes en tu lugar. Si el ataque es un impacto, tira al azar para ver si el objetivo elegido es real o una quimera. Si es una quimera, queda destruida. Si el ataque falla por 5 o menos, una de tus quimeras queda destruida por el fallo cercano. Los conjuros de área y los conjuros y efectos que no requieren tirada de ataque te afectan normalmente y no destruyen ninguna de tus quimeras. Los conjruso que requieren un ataque de toque se descargan sin causar daño si se utilizan para destruir a una quimera.
      El atacante debe ser capaz de ver a las quimeras para ser engañado. Si eres invisible o si el atacante es ciego, el conjuro no tiene efecto (aunque la posibilidad normal de fallo sigue aplicándose).
    fuente:
      libro: Reglamento básico
      pagina: 305
    verificacion:
      estado: verificado_pdf_local
  - nombre: Resistir energía
    alias_en_ingles: Resist Energy
    nivel: 2
    escuela: Abjuración
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, FD
      materiales:
    alcance: toque
    objetivo: criatura tocada
    efecto:
    area:
    duracion: 10 min./nivel
    cancelable: false
    tirada_de_salvacion:
    resistencia_a_conjuros: sí (inofensivo)
    descripcion: |-
      Esta abjuración concede a una criatura protección limitada contra el daño de uno cualquiera de los cinco tipos de energía que selecciones: ácido, frío, electricidad, fuego o sonido. El objetivo gana resistencia a la energía 10 contra el tipo de energía escogido, lo que significa que cada vez que el objetivo esté sujeta a tales daños (ya sea de una fuente natural o mágica), este daño se reduce en 10 puntos antes de ser aplicado a los puntos de golpe de la criatura. El valor de la resistencia a la energía concedida se incrementa a 20 puntos a nivel 7 y a un máximo de 30 puntos a nivel 11. El conjuro también protege el equipo del destinatario.
      Resistir energía sólo absorbe daño. El objetivo todavía puede sufrir efectos secundarios desafortunados.
      Resistir energía se solapa (y no se apila con) protección contra la energía . Si un personaje está protegido con protección contra la energía y resistir energía , el conjuro de protección absorbe daño hasta que se agote su poder.
    fuente:
      libro: Reglamento básico
      pagina: 350
    verificacion:
      estado: verificado_pdf_local
  - nombre: Truco de la cuerda
    alias_en_ingles: Rope Trick
    nivel: 2
    escuela: transmutación; Nivel hechicero/mago 2
