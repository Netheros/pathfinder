  - nombre: Convocar monstruo iv
    alias_en_ingles: Summon Monster IV
    nivel: 1
    escuela: Conjuración
    subescuela: convocación
    descriptores:
    - ver texto
    tiempo_de_lanzamiento: 1 asalto
    componentes:
      abreviatura: V, S, F/FD
      materiales: una diminuta bolsa y una pequeña vela
    alcance: corto (25 pies + 5 pies/2 niveles)
    objetivo:
    efecto: una criatura convocada
    area:
    duracion: 1 asalto/nivel (D)
    cancelable: true
    tirada_de_salvacion:
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Este conjuro convoca a una criatura extraplanar (habitualmente un ajeno, elemental o bestia mágica nativa de otro plano). Aparece donde designes y actúa inmediatamente, en tu turno. Ataca a tus oponentes al máximo de sus capacidades. Si puedes comunicarte con la criatura, puedes dirigirla para que no ataque, para que ataque a enemigos concretos o para realizar otras acciones. El conjuro convoca a una de las criaturas de la lista de nivel 1 de la tabla 10-2. Tú eliges qué tipo de criatura convocas y puedes elegir un tipo diferente cada vez que lanzas el conjuro.
      Una criatura convocada no puede convocar ni conjurar de ningún otro modo a otra criatura, ni tampoco puede utilizar aptitudes de teletransporte o viaje planar. Las criaturas no pueden ser convocadas a un entorno que no sea soportable para ellas. Las criaturas convocadas usando este conjuro no pueden usar conjuros o aptitudes sortílegas que dupliquen conjuros con componentes materiales caros (como deseo ).
      Cuando usas un conjuro de convocación para traer a una criatura con un alineamiento o de subtipo elemental, se convierte en un conjuro de ese tipo. Las criaturas de la tabla 10-1 marcadas con un asterisco son convocadas con la plantilla celestial, si eres de alineamiento bueno, o infernal si eres de alineamiento maligno. Si eres de alineamiento neutral, puedes elegir qué plantilla aplicar a la criatura. Las criaturas marcadas con un asterisco siempre poseen un alineamiento que encaja con el tuyo, independientemente de su alineamiento habitual.
      Convocar a esas criaturas hace que el tipo de conjuro de convocación coincida con tu alineamiento.
      Convocar monstruo II Summon Monster II Escuela conjuración (convocación) Nivel antipaladín 2, bardo 2, bruja 2, clérigo/oráculo 2, convocador 2, hechicero/mago 2
      Este conjuro funciona como convocar monstruo I , excepto en que puedes convocar a una criatura de la lista de nivel 2 o 1d3 criaturas del mismo tipo de la lista de nivel 1.
      Convocar monstruo III Summon Monster III Escuela conjuración (convocación) Nivel antipaladín 3, bardo 3, bruja 3, clérigo/oráculo 3, convocador 3, hechicero/mago 3
      Este conjuro funciona como convocar monstruo I , excepto en que puedes convocar a una criatura de la lista de nivel 3, 1d3 criaturas del mismo tipo de la lista de nivel 2 o 1d4+1 criaturas del mismo tipo de la lista de nivel 1.
      Convocar monstruo IV Summon Monster IV Escuela conjuración (convocación) Nivel antipaladín 4, bardo 4, bruja 4, clérigo/oráculo 4, convocador 3, hechicero/mago 4
      Este conjuro funciona como convocar monstruo I , excepto en que puedes convocar a una criatura de la lista de nivel 4, 1d3 criaturas del mismo tipo de la lista de nivel 3 o 1d4+1 criaturas del mismo tipo de cualquier lista de nivel inferior.
      Convocar monstruo V Summon Monster V Escuela conjuración (convocación) Nivel bardo 5, bruja 5, clérigo/oráculo 5, convocador 4, hechicero/mago 5
      Este conjuro funciona como convocar monstruo I , excepto en que puedes convocar a una criatura de la lista de nivel 5, 1d3 criaturas del mismo tipo de la lista de nivel 4 o 1d4+1 criaturas del mismo tipo de cualquier lista de nivel inferior.
      Convocar monstruo VI Summon Monster VI Escuela conjuración (convocación) Nivel bardo 6, bruja 6, clérigo/oráculo 6, hechicero/mago 6
      Este conjuro funciona como convocar monstruo I , excepto en que puedes convocar a una criatura de la lista de nivel 6, 1d3 criaturas del mismo tipo de la lista de nivel 5 o 1d4+1 criaturas del mismo tipo de cualquier lista de nivel inferior.
      Convocar monstruo VII Summon Monster VII Escuela conjuración (convocación) Nivel bruja 7, clérigo/oráculo 7, convocador 5, hechicero/mago 7
      Este conjuro funciona como convocar monstruo I , excepto en que puedes convocar a una criatura de la lista de nivel 7, 1d3 criaturas del mismo tipo de la lista de nivel 6 o 1d4+1 criaturas del mismo tipo de cualquier lista de nivel inferior.
      Convocar monstruo VIII Summon Monster VIII Escuela conjuración (convocación) Nivel bruja 8, clérigo/oráculo 8, convocador 6, hechicero/mago 8
      Este conjuro funciona como convocar monstruo I , excepto en que puedes convocar a una criatura de la lista de nivel 8, 1d3 criaturas del mismo tipo de la lista de nivel 7 o 1d4+1 criaturas del mismo tipo de cualquier lista de nivel inferior.
      Convocar monstruo IX Summon Monster IX Escuela conjuración (convocación) Nivel bruja 9, clérigo/oráculo 9, hechicero/mago 9
      Este conjuro funciona como convocar monstruo I , excepto en que puedes convocar a una criatura de la lista de nivel 9, 1d3 criaturas del mismo tipo de la lista de nivel 8 o 1d4+1 criaturas del mismo tipo de cualquier lista de nivel inferior.
      Convocar monstruo menor Summon minor monster Escuela conjuración (convocación) Nivel antipaladín 1, bardo 1, bruja 1, clérigo/oráculo 1, convocador 1, hechicero/mago 1 Tiempo de lanzamiento 1 round Componentes V, S, F/FD (una bolsa menuda y una vela pequeña) Alcance corto (25 pies + 5 pies/nivel) Efecto 1d3 criaturas convocadas Duración 1 asalto/nivel (D) Tiro de salvación ninguno Resistencia a conjuros no
      Este conjuro funciona como convocar monstruo I, excepto en que puedes convocar 1d4 animales menudos o más pequeños, como comadrejas, lagartos, monos, murciélagos, ratas o sapos. Los animales convocados deben ser todos del mismo tipo de criatura. Como con los animales convocados con convocar monstruo I, puedes aplicar una plantilla del alineamiento apropiado a estos animales.
    fuente:
      libro: Reglamento básico
      pagina: 268
    verificacion:
      estado: verificado_pdf_local
  - nombre: Muro de fuego
    alias_en_ingles: Wall Of Fire
    nivel: 4
    escuela: Evocación
    subescuela:
    descriptores:
    - fuego
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M/FD
      materiales: un trozo de fósforo
    alcance: intermedio ( 100 pies + 10 pies/nivel)
    objetivo:
    efecto: cortina de llamas opaca de hasta 20 pies de largo/nivel o un anillo de
      fuego con un radio de hasta 5 pies/dos niveles; en ambas formas 20 pies de alto
    area:
    duracion: concentración + 1 asalto/nivel
    cancelable: false
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: sí
    descripcion: |-
      Una inmóvil y llameante cortina de brillante fuego violeta brota a la existencia. Un lado del muro, seleccionado por ti, emite ondas de calor hacia delante, infligiendo 2d4 puntos de daño por fuego a las criaturas hasta 10 pies y 1d4 puntos de daño por fuego a las que sobrepasan los 10 y no superan los20 pies. El muro inflige este daño cuando aparece, y a todas las criaturas en el área en tu turno cada asalto. Además, el muro inflige 2d6 puntos de daño por fuego +1 punto de daño por fuego por nivel de lanzador (máximo +20) a cualquier criatura que lo atraviese. El muro inflige daño doble a las criaturas muertas vivientes.
      Si evocas el muro para que aparezca en un lugar ya ocupado por criaturas, cada criatura recibe daño como si atravesara el muro. Si cualquier sección de 5 pies del muro recibe 20 o más puntos de daño por frío en un asalto, esa sección desaparece. (No dividas el daño de frío entre 2, como se hace normalmente con los objetos).
      El muro de fuego puede ser hecho permanente con un conjuro de permanencia . Un muro de fuego permanente que es extinguido por daño de frío permanece inactivo durante 10 minutos, tras lo que se reforma con su fuerza normal.
    fuente:
      libro: Reglamento básico
      pagina: 323
    verificacion:
      estado: verificado_pdf_local
  - nombre: Muro de hielo
    alias_en_ingles: Wall Of Ice
    nivel: 4
    escuela: Evocación
    subescuela:
    descriptores:
    - frío
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M
      materiales: un trozo de cuarzo o cristal de roca
    alcance: intermedio ( 100 pies + 10 pies/nivel)
    objetivo:
    efecto: plano de hielo anclado, hasta un cuadrado de 10 pies/nivel, o hemisferio
      de hielo con un radio de hasta 3 pies +1 pie/nivel.
    area:
    duracion: 1 min./nivel
    cancelable: false
    tirada_de_salvacion: Reflejos niega; ver texto
    resistencia_a_conjuros: sí
    descripcion: |-
      Este conjuro crea un plano de hielo anclado o un hemisferio de hielo, dependiendo de la versión seleccionada. Un muro de hielo no se puede crear en un área ocupada por objetos físicos o criaturas. Su superficie debe ser lisa y continua cuando se crea. Cualquier criatura adyacente al muro cuando es creado puede intentar una salvación de Reflejos para interrumpir el muro cuando se está formando. Una salvación exitosa indica que el conjuro falla automáticamente. El fuego puede derretir el muro de hielo , e inflige daño completo al muro (en lugar del habitual mitad de daño que reciben los objetos). Derretir repentinamente un muro de hielo crea una gran nube de niebla húmeda durante 10 minutos.
      Plano de hielo: Una lámina de fuerte y duro hielo aparece. El muro es de una pulgada de espesor por nivel de lanzador. Cubre un área de hasta 10 pies por nivel de lanzador (así, un mago de nivel 10 puede crear un muro de hielo de 100 pies de largo por 10 pies de alto, un muro de 50 pies de largo y 20 pies de alto, o cualquier otra combinación de longitud y altura que no exceda 1000 pies cuadrados ). El plano puede ser orientado en cualquier forma mientras esté anclado. Un muro vertical sólo necesita estar anclado al suelo, mientras que un plano horizontal o inclinado debe estar anclado en dos lados opuestos. Cada 10 pies cuadrados de muro tienen 3 puntos por pulgada de grosor. Las criaturas pueden golpear el muro de forma automática. Una sección de muro cuyos puntos de golpe bajen a 0 esta rota. Si una criatura intenta romper el muro de un solo golpe, la CD para la prueba de Fuerza es 15 + nivel de lanzador. Incluso cuando el hielo se ha roto, permanece una corriente de aire gélido. Cualquier criatura que lo atraviese (incluyendo el que la rompió) recibe 1d6 puntos de daño por frío +1 punto por nivel de lanzador (sin salvación). Hemisferio: El muro recibe la forma de un hemisferio cuyo radio máximo es de 3 pies + 1pie por nivel de lanzador. El hemisferio es tan duro de romper como la forma de plano de hielo, pero no inflige daño a aquellos que lo atraviesa por una parte rota.
    fuente:
      libro: Reglamento básico
      pagina: 324
    verificacion:
      estado: verificado_pdf_local
  - nombre: Nube aniquiladora
    alias_en_ingles: Cloudkill
    nivel: 5
    escuela: Conjuración
    subescuela: creación
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: intermedio ( 100 pies + 10 pies/nivel)
    objetivo:
    efecto: nube que se expande en un radio de 20 pies y 20 pies de altura
    area:
    duracion: 1 min./nivel
    cancelable: false
    tirada_de_salvacion: Fortaleza parcial; ver texto
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Este conjuro genera un banco de niebla similar a nube brumosa , excepto que sus vapores son verde amarillentos y venenosos. Estos vapores matan automáticamente a cualquier criatura viva con 3 o menos DG (sin salvación).
      Una criatura viva con entre 4 a 6 DG es asesinada a no ser que tenga éxito en una salvación de Fortaleza (en cuyo caso recibe 1d4 puntos de Constitución de daño en tu turno cada asalto mientras esté dentro de la nube).
      Una criatura viva con 6 o más DG recibe 1d4 puntos de Constitución de daño en tu turno cada asalto que esté dentro de la nube (una salvación de Fortaleza exitosa reduce a la mitad este daño). Aguantar la respiración no ayuda, pero las criaturas inmunes al veneno no se ven afectadas por el conjuro.
      A diferencia de nube brumosa , la nube aniquiladora se aleja de ti a 10 pies por asalto, rodando por la superficie del suelo.
      Calcula la nueva propagación de la nube cada asalto en función de su nuevo punto de origen, el cual está 10 pies más lejos que el punto de origen donde has lanzado el conjuro.
      Debido a que los vapores son más pesados que el aire, se hunden al nivel más bajo de la tierra, incluso bajando por aberturas de madrigueras o pozos. No puede penetrar líquidos, ni ser lanzado bajo el agua.
    fuente:
      libro: Reglamento básico
      pagina: 327
    verificacion:
      estado: verificado_pdf_local
  - nombre: Transmigración
    alias_en_ingles: Magic Jar
    nivel: 5
    escuela: Nigromancia
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, F
      materiales: una gema o cristal por valor de al menos 100 po
    alcance: intermedio (100 pies + 10 pies/nivel)
    objetivo: una criatura
    efecto:
    area:
    duracion: 1 hora/nivel o hasta que vuelvas a tu cuerpo
    cancelable: false
    tirada_de_salvacion: Voluntad niega; ver texto
    resistencia_a_conjuros: sí
    descripcion: |-
      Al lanzar transmigración, colocas tu alma en una gema o cristal grande (denominado receptáculo), dejando tu cuerpo inerte. Después puedes tratar de tomar el control de un cuerpo cercano, encerrando su alma en el receptáculo. Puedes volver al receptáculo (devolviendo al alma atrapada a su propio cuerpo), y tratar de poseer otro cuerpo.
      El conjuro finaliza cuando envías tu alma de vuelta a tu propio cuerpo, dejando el receptáculo vacío. Para lanzar el conjuro, el receptáculo debe estar dentro del alcance del conjuro y debes saber dónde está, aunque no necesitas una línea de visión o de efecto hasta él. Cuando transfieres tu alma durante el lanzamiento, tu cuerpo está, a ojos de cualquiera, muerto. Mientras estés en el receptáculo, puedes sentir y atacar cualquier fuerza vital que esté a 10 pies por nivel de lanzador (y en el mismo plano de existencia).
      No necesitas línea de efecto desde el receptáculo hasta las criaturas. No puedes determinar los tipos exactos de criaturas o sus posiciones.
      En un grupo de fuerzas vitales, puedes sentir una diferencia de 4 o más DG entre una criatura y otra y puedes determinar si la fuerza vital se alimenta de energía positiva o negativa (los muertos vivientes se alimentan de energía negativa. Sólo los muertos vivientes inteligentes tienen, o son, almas).
      Puedes elegir si asaltas a una criatura más fuerte o más débil, pero a qué criatura tratas de poseer exactamente se determina aleatoriamente.
      Tratar de poseer un cuerpo es una acción de asalto completo. Resulta bloqueada por protección contra el mal o custodias similares. Posees el cuerpo y obligas al alma de la criatura a entrar en el receptáculo a menos que supere una salvación de Voluntad. Un fallo en expulsar al receptor deja tu fuerza vital en el receptáculo y el objetivo supera automáticamente posteriores salvaciones si tratas de poseer su cuerpo de nuevo.
      Si tienes éxito, tu fuerza vital ocupa el cuerpo anfitrión y su fuerza vital queda aprisionada en el receptáculo. Mantienes tus puntuaciones de Inteligencia, Sabiduría y Carisma, nivel, clase, bonificador de ataque base, bonificadores base de salvaciones, alineamiento y aptitudes mentales. El cuerpo retiene su Fuerza, Destreza, Constitución, puntos de golpe, aptitudes naturales y aptitudes automáticas. Un cuerpo con extremidades adicionales no te permite realizar más ataques (o ataques con dos armas más ventajosos) de lo normal. No puedes activar las aptitudes extraordinarias o sobrenaturales del cuerpo. Los conjuros y aptitudes sortílegas de la criatura no permanecen con el cuerpo.
      Como acción estándar, puedes intercambiar un huésped con el receptáculo si está dentro del alcance, enviando al alma atrapada de vuelta a su cuerpo. El conjuro finaliza si saltas del receptáculo hasta tu propio cuerpo.
      Si el cuerpo anfitrión muere, vuelves al receptáculo, si está dentro del alcance y la fuerza vital del anfitrión desaparece (si está muerto). Si el cuerpo anfitrión muere más allá del alcance del conjuro, tanto tú como tu huésped moriréis. Cualquier fuerza vital que no tenga a dónde ir se considera muerta.
      Si el conjuro finaliza mientras estás en el receptáculo, vuelves a tu cuerpo (o mueres si éste está fuera de alcance o destruido). Si el conjuro termina mientras estás en un huésped, vuelves a tu cuerpo (o mueres si está fuera del alcance desde tu posición) y el alma en el receptáculo vuelve a su cuerpo (o muere si está fuerade alcance). Destruir el receptáculo finaliza el conjuro y puede ser disipado desde el receptáculo o desde la posición del anfitrión.
