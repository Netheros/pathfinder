    descripcion: |-
      Creas una imagen fantasmal de la criatura más aterradora imaginable por el objetivo simplemente formando los temores de la mente subconsciente del objetivo en algo que su mente consciente puede visualizar: su bestia más horrible. Sólo el objetivo del conjuro puede ver al asesino fantasmal . Tú ves solamente una forma vaga. El objetivo primero realiza una salvación de Voluntad para reconocer la imagen como irreal. Si la salvación falla, el fantasma toca al objetivo y este debe tener éxito en una salvación de Fortaleza o morir de miedo. Incluso si la salvación de Fortaleza tiene éxito, el objetivo recibe 3d6 puntos de daño.
      Si el objetivo de un asesino fantasmal tiene éxito en descreer y posee telepatía o lleva puesto un yelmo de telepatía, la bestia se vuelve sobre ti. Entonces debes descreer o convertirte en el objetivo de su mortífero ataque de miedo.
