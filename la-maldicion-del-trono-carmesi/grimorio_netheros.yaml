  - nombre: Fireball
    alias_en_ingles: Fireball
    nivel: 3
    escuela: Evocación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M (a ball of bat guano and sulfur)
