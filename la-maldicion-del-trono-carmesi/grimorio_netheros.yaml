      abreviatura: V, S, M (a rotten egg or cabbage leaves)
      materiales:
    alcance: medium (100 ft. + 10 ft./level)
    objetivo:
    efecto: cloud spreads in 20-ft. radius, 20 ft. high
    area:
    duracion: 1 round/level
    cancelable: false
    tirada_de_salvacion: Fortitude negates; see text
    resistencia_a_conjuros:
    descripcion: Stinking cloud creates a bank of fog like that created by fog cloud,
      except that the vapors are nauseating. Living creatures in the cloud become
      nauseated. This condition lasts as long as the creature is in the cloud and
      for 1d4+1 rounds after it leaves. (Roll separately for each nauseated character.)
      Any creature that succeeds on its save but remains in the cloud must continue
      to save each round on your turn. This is a poison effect. Stinking cloud can
      be made permanent with a permanency spell. A permanent stinking cloud dispersed
      by wind reforms in 10 minutes.
