      estado: pendiente
  - nombre: Disguise Self
    alias_en_ingles: Disguise Self
    nivel: 1
    escuela: Ilusión
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S
      materiales:
    alcance: personal
    objetivo: you
    efecto:
    area:
    duracion: 10 min./level
    cancelable: true
    tirada_de_salvacion:
    resistencia_a_conjuros:
    descripcion: You make yourself--including clothing, armor, weapons, and equipmen--look
      different. You can seem 1 foot shorter or taller, thin, fat, or in between.
      You cannot change your creature type (although you can appear as another subtype).
      Otherwise, the extent of the apparent change is up to you. You could add or
      obscure a minor feature or look like an entirely different person or gender.
      The spell does not provide the abilities or mannerisms of the chosen form, nor
      does it alter the perceived tactile (touch) or audible (sound) properties of
      you or your equipment. If you use this spell to create a disguise, you get a
      +10 bonus on the Disguise check. A creature that interacts with the glamer gets
      a Will save to recognize it as an illusion.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Dormir
    alias_en_ingles: Sleep
