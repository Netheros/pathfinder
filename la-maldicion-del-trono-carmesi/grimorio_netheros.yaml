    area:
    duracion: 1 minute
    cancelable: true
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: 'Depending on the version selected, you create up to four lights
      that resemble lanterns or torches (and cast that amount of light), or up to
      four glowing spheres of light (which look like will-o''-wisps), or one faintly
      glowing, vaguely humanoid shape. The dancing lights must stay within a 10-foot-radius
      area in relation to each other but otherwise move as you desire (no concentration
      required): forward or back, up or down, straight or turning corners, or the
      like. The lights can move up to 100 feet per round. A light winks out if the
      distance between you and it exceeds the spell''s range. You can only have one
      dancing lights spell active at any one time. If you cast this spell while another
      casting is still in effect, the previous casting is dispelled. If you make this
      spell permanent, it does not count against this limit. Dancing lights can be
      made permanent with a permanency spell.'
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Daze
