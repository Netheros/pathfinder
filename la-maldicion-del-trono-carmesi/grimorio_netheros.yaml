      Hasta 2 DG: la criatura queda ínconsciente, cegada y aturdida durante 2d4 asaltos; tras los que estará cegada y aturdida durante 1d4 asaltos más y finalmente sólo aturdida 1 asalto adicional. Solamente las criaturas vivas pueden quedar inconscientes.
      3 ó 4 DG: la criatura queda cegada y aturdida durante 1d4 asaltos, y tras ello aturdida 1 asalto más.
      5 ó más DG: la criatura queda aturdida 1 asalto.
      Las criaturas ciegas no resultan afectadas por la rociada de color.
