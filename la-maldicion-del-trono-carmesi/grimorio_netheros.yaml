  - nombre: Teletransportar
    alias_en_ingles: Teleport
    nivel: 5
    escuela: Conjuración
    subescuela: teletransporte
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V
      materiales:
    alcance: personal y toque
    objetivo: tú y objetos tocados u otras criaturas voluntarias tocadas
    efecto:
    area:
    duracion: instantáneo
    cancelable: false
    tirada_de_salvacion: no y Voluntad niega (objeto)
    resistencia_a_conjuros: no y sí (objeto)
    descripcion: |-
      Este conjuro te transporte instantáneamente a una posición designada, que puede estar tan lejos como 1.000 millas por nivel de lanzador. El viaje entre planos no es posible. Puedes transportar objetos mientras que su peso no exceda tu carga máxima. También puedes llevar una criatura adicional voluntaria de tamaño Medio o más pequeño (llevando equipo u objetos hasta su carga máxima) o su equivalente por cada tres niveles de lanzador. Una criatura Grande cuenta como dos criaturas Medianas, una criatura Enorme cuenta como 4 criaturas Medianas y así sucesivamente. Todas las criaturas a transportar deben estar en contacto unas con otras, y al menos una de esas criaturas debe estar en contacto contigo. Al igual que con todos los conjuros donde el alcance es personal y el objetivo eres tú, no necesitas hacer una tirada de salvación, ni te es aplicable la resistencia a conjuros. Solo los objetos portados o que estén siendo usados (atendidos) por otra persona reciben tiradas de salvación y resistencia a conjuros.
      Debes tener una idea clara de la localización y disposición del destino. Cuando más clara sea tu imagen mental, más probable es que funcione el teletransporte. Las zonas de energía física o mágica fuerte pueden hacer el teletransporte más peligroso o incluso imposible.
      Para ver cómo de bien funciona el teletransporte, tira un d100 y consulta la tabla al final de este conjuro. Consulta la siguiente información para las definiciones de los términos de la tabla.
      Familiaridad: “Muy familiar” es un lugar donde has estado muy a menudo y donde te sientes en casa. “Estudiado minuciosamente” es un lugar que conoces bien, ya sea porque puedes verlo actualmente o porque has estado allí a menudo. “Visto alguna vez” es un lugar que has visto más de una vez pero con el que no estás muy familiarizado. “Visto una vez” es un sitio que has visto una vez, posiblemente usando magia como escudriñamiento .
      “Falso destino” es un lugar que en realidad no existe o que te estás teletransportando a un destino, por lo demás familiar, que ya no existe como tal o que ha sido tan alterado que ya no es familiar para ti. Cuando viajas a un falso destino, tira 1d20+80 para obtener resultados en la tabla, en lugar de tirar 1d%, ya que no hay destino real para ti al que puedas esperar llegar o quizá ser desviado.
      En el objetivo: apareces donde quieres estar.
      Lejos del objetivo: apareces a salvo a una distancia aleatoria del destino en una dirección aleatoria. La distancia del desvío es 1 d% de la distancia que iba a ser recorrida. La dirección del desvío es determinada aleatoriamente.
      Área similar: acabas en un área que es visual o temáticamente parecido al lugar de destino. Generalmente apareces en el lugar similar más cercano dentro del alcance. Si no existe dicha área dentro del alcance del conjuro, el conjuro simplemente falla.
      Percance: Tú y cualquier otra persona que se esté teletransportando contigo habéis llegado “revueltos”. Cada uno de vosotros recibe 1d10 puntos de daño, y vuelves a tirar en la tabla para ver dónde acabáis. Para esta nueva tirada, lanza 1d20+80.
      Cada vez que saques “Percance”, los personajes reciben más daño y deben volver a tirar.
      Teletransportar mayor Teleport, Greater Escuela conjuración (teletransporte) Nivel bruja 7, convocador 5, hechicero/mago 7
      Este conjuro funciona como teletransportar , excepto que no tiene límite de alcance y no hay ninguna posibilidad de llegar desviado. Además, no necesitas haber visto el destino, pero en este caso debes tener al menos una descripción fiable del sitio al que te quieres teletransportar. Si intentas teletransportarte con información insuficiente (o con información engañosa), simplemente desapareces y reapareces en el mismo sitio. El viaje entre planos no es posible.
    fuente:
      libro: Reglamento básico
      pagina: 361
    verificacion:
      estado: verificado_pdf_local
