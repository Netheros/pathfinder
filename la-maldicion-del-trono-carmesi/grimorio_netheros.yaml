      Este conjuro aflige al objetivo con una carcajada incontrolable. Se colapsa en oleadas de risas maníacas, quedando tumbado. El objetivo no puede llevar a cabo acciones mientras se ríe, pero no se le considera indefenso.
      Después de que finalice el conjuro, puede actuar normalmente. En el siguiente turno de la criatura, puede intentar una nueva tirada de salvación para finalizar el efecto.
      Esta es una acción de asalto completo que no provoca ataques de oportunidad. Si esta salvación tiene éxito, el efecto termina. Si no, la criatura continúa riéndose hasta el final de la duración.
      Una criatura con una puntuación de Inteligencia de 2 o menos no se ve afectada.
      Una criatura cuyo tipo sea diferente del del lanzador recibe un bonificador +4 a su tirada de salvación, por que el humor no se "traduce" bien.
    fuente:
      libro: Reglamento básico
      pagina: 362
    verificacion:
      estado: verificado_pdf_local
  - nombre: Invisibilidad
    alias_en_ingles: Invisibility
    nivel: 2
    escuela: Ilusión
    subescuela: engaño
    descriptores: &1 []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M/FD
      materiales: una pestaña pegada con goma arábiga
    alcance: personal o toque
    objetivo: tú o una criatura u objeto que no pese más de 100 libras/nivel
    efecto:
    area:
    duracion: 1 min./nivel (D)
    cancelable: true
    tirada_de_salvacion: Voluntad niega (inofensivo) o Voluntad niega (inofensivo,
      objeto)
    resistencia_a_conjuros: sí (inofensivo) o sí (inofensivo, objeto)
    descripcion: |-
      La criatura u objeto tocado se convierten en invisibles. Si el beneficiario es una criatura portando equipo, este también se desvanece. Si lanzas el conjuro sobre alguien más, ni tú ni tus aliados podéis ver al sujeto, a menos que normalmente puedas ver cosas invisibles o emplees magia que te permita hacerlo.
      Los objetos caídos o dejados por una criatura invisible se convierte en visibles; los objetos recogidos desparecen si se guardan en las ropas o se meten dentro de las bolsas de la criatura. La luz, sin embargo, nunca se hace invisible, aunque una fuente de luz sí puede hacerse invisible (así, el efecto es el de una luz sin fuente visible). Cualquier parte de un objeto que lleve el sujeto y se extienda más de 10 pies hará visible.
      Por supuesto, si el sujeto no está silenciado mágicamente, y otras condiciones, pueden hacer que el beneficiario sea detectado (como nadar en el agua o pisar un charco). Si se requiere una prueba, una criatura invisible inmóvil tiene un bonificador +40 en su prueba de Sigilo. Este bonificador se reduce a +20 si la criatura se está moviendo. El conjuro finaliza si el sujeto ataca a cualquier criatura. A los propósitos de este conjuro, un ataque incluye cualquier conjuro lanzado a un enemigo o cuya área de efecto incluya a un enemigo. Quién es exactamente un enemigo depende de la percepción del personaje invisible. Acciones dirigidas a objetos desatendidos no rompen el conjuro. Causar daño indirectamente no es un ataque. Así, un ser invisible puede abrir puertas, hablar, comer, subir escaleras, convocar monstruos y hacer que ellos ataquen, cortar las cuerdas que sostienen un puente de cuerda mientras los enemigos están en el puente, activar trampas de acción remota, abrir una reja para liberar perros de presa y similares. Si el sujeto ataca directamente, sin embargo, se hace visible inmediatamente junto con todo su equipo.
      Conjuros como bendecir que afectan específicamente a aliados pero no enemigos no son ataques a estos propósitos, incluso cuando haya enemigos en su área.
      Invisibilidad puede ser hecha permanente (sólo en objetos) con un conjuro de permanencia.
      Invisibilidad en grupo Invisibility, Mass Escuela ilusión (engaño) Nivel convocador 5, hechicero/mago 7, inquisidor 4 Alcance largo ( 400 pies + 40 pies/nivel) Objetivo cualquier número de criaturas, dos de los cuales no pueden estar alejados más de 180 pies
      Este conjuro funciona como invisibilidad, excepto en que el efecto se mueve con el grupo y se rompe cuando cualquiera del grupo ataca.
      Los individuos del grupo no pueden ver a los demás. El conjuro se rompe por cualquier individuo que se mueva a más de 180 pies de su miembro más cercano del grupo. Si sólo son afectados dos individuos, el que se aleja del otro pierde su invisibilidad. Si ambos se alejan el uno del otro, ambos se hacen visibles cuando la distancia entre ellos exceda los 180 pies.
      Invisibilidad mayor Invisibility, Greater Escuela ilusión (engaño) Nivel alquimista 4, antipaladín 4, bardo 4, convocador 3, hechicero/mago 4 Componentes V, S Objetivo tú o criatura tocada Duración 1 asalto/nivel (D) Tiro de salvación Voluntad niega (inofensivo)
      Este conjuro funciona como invisibilidad, excepto que no finaliza si el sujeto ataca.
    fuente:
      libro: Reglamento básico
      pagina: 310
    verificacion:
      estado: verificado_pdf_local
  - nombre: Apertura
    alias_en_ingles: Knock
    nivel: 2
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V
      materiales:
    alcance: intermedio (100 pies + 10 pies/nivel)
    objetivo: una puerta, caja o cofre con un área de hsata 10 pies cuadrados/nivel
    efecto:
    area:
    duracion: instantáneo; ver texto
    cancelable: false
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Apertura abre puertas atascadas, barradas o cerradas, así como aquellas sujetas a trabar portal o cerradura arcana. Tras completar el lanzamiento de este conjuro, haz una prueba de nivel de lanzador contra la CD de la cerradura con un bonificador +10. Si tienes éxito, apertura desbloquea hasta dos métodos de cierre. Este conjuro abre puertas secretas, así como cajas o cofres cerradas o con apertura mediante resortes ocultos. También afloja soldaduras, argollas o cadenas (suponiendo que sirvan para mantener algo cerrado). Si se usa para abrir una puerta cerrada mediante cerradura arcana, el conjuro no elimina la cerradura arcana, sino que la suspende durante 10 minutos.
      En todos los demás casos, la puerta no se vuelve a cerrar sola ni vuelve a atascarse por sí misma. Apertura no levanta puertas barradas o impedimentos similares (por ejemplo rastrillos) ni afecta a cuerdas, lianas y similares. El efecto está limitado por el área. Cada lanzamiento puede deshacer un máximo de dos formas de evitar el acceso.
    fuente:
      libro: Reglamento básico
      pagina: 245
    verificacion:
      estado: verificado_pdf_local
  - nombre: Levitar
    alias_en_ingles: Levitate
    nivel: 2
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, F
      materiales: un lazo de cuero o cordel dorado doblado en forma de copa
    alcance: personal or corto (25 pies + 5 pies/2 niveles)
    objetivo: tú, una criatura voluntaria o un objeto (peso total hasta 100 libras/nivel)
    efecto:
    area:
    duracion: 1 min./nivel (D)
    cancelable: true
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Levitar te permite moverte a ti, a otra criatura o a un objeto hacia arriba y hacia abajo como desees. Una criatura debe ser voluntaria para levitar y un objeto debe estar desatendido o en posesión de una criatura voluntaria. Puedes dirigir mentalmente al recipiente para que se mueva arriba o abajo hasta 20 pies por asalto; hacerlo es una acción de movimiento. No puedes mover al receptor horizontalmente, pero éste podría trepar por la pared de un barranco, por ejemplo, o empujarse contra un techo para moverse lateralmente (normalmente a la mitad de su velocidad base terrestre).
      Una criatura que levite y que ataque con un arma cuerpo a cuerpo o a distancia se encuentra más y más inestable; el primer ataque tiene un penalizador -1, el segundo -2, etc. (hasta un penalizador máximo de -5). Pasar un asalto completo estabilizándose permite a una criatura volver a comenzar con un -1.
    fuente:
      libro: Reglamento básico
      pagina: 312
    verificacion:
      estado: verificado_pdf_local
  - nombre: Localizar objeto
    alias_en_ingles: Locate Object
    nivel: 2
    escuela: Adivinación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, F/FD
      materiales: una ramita bifurcada
    alcance: largo ( 400 pies + 40 pies/nivel)
    objetivo:
    efecto:
    area: círculo, centrado en ti, con un radio de 400 pies + 40 pies/nivel
    duracion: 1 min./nivel
    cancelable: false
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Percibes la dirección de un objeto muy conocido o claramente visualizado. Puedes buscar objetos generales, en cuyo caso localizas el más cercano de ese tipo si hay más de uno dentro del alcance. Tratar de encontrar un objeto concreto requiere una imagen mental específica y precisa; si la imagen no está lo suficientemente cerca del objeto real, el conjuro falla. No puedes especificar un objeto único sin haberlo observado de primera mano (no a través de adivinación).
      Este conjuro es bloqueado por hasta una fina lámina de plomo. Las criaturas no pueden ser encontradas con este conjuro. Polimorfar cualquier cosa e indetectabilidad lo engañan.
    fuente:
      libro: Reglamento básico
      pagina: 316
    verificacion:
      estado: verificado_pdf_local
  - nombre: Imagen menor
    alias_en_ingles: Minor Image
    nivel: 2
    escuela: Ilusión
    subescuela: quimera
    descriptores: []
    tiempo_de_lanzamiento:
    componentes:
      abreviatura:
      materiales:
    alcance:
    objetivo:
    efecto:
    area:
    duracion: concentración + 2 asaltos
    cancelable: false
    tirada_de_salvacion:
    resistencia_a_conjuros:
    descripcion: Este conjuro funciona como imagen silenciosa, pero incluye algunos
      sonidos menores (aunque no un habla inteligible).
    fuente:
