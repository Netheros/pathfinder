    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, F/DF
      materiales: una campanita y un trozo de hilo de plata muy fino
    alcance: corto ( 25 pies + 5 pies/2 niveles)
    objetivo:
