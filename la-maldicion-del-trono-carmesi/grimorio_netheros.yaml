    duracion: 2d4 asaltos (D)
    cancelable: true
    tirada_de_salvacion: Voluntad niega
    resistencia_a_conjuros: sí
    descripcion: |-
      Tus gestos y ensalmos monótonos fascinan a las criaturas cercanas, haciendo que se detengan y te miren fijamente.
      Además, puede usar su atención absorta para hacer que tus sugerencias y peticiones resulten más plausibles. Tira 2d4 para ver el total de DG de criaturas que afectas. Las criaturas con menos DG son afectadas antes que las que tienen más DG. Sólo las criaturas que puedan verte u oírte son afectadas, pero no tienen por qué comprenderte para quedar fascinadas.
      Si usas este conjuro en combate, cada objetivo obtiene un bonificador +2 a su tirada de salvación. Si el conjuro sólo afecta a una única criatura en combate a la vez, la tirada de salvación tiene un penalizador de -2.
      Mientras el objetivo esté fascinado por este conjuro, reacciona como si su actitud fuera dos pasos más amistosa. Esto te permite hacer una única petición a la criatura afectada (suponiendo que puedas comunicarte con ella). La petición debe ser breve y razonable. Incluso después de que el conjuro finalice, la criatura permanece en esta nueva actitud hacia ti, pero sólo en lo que respecta a esa petición en concreto.
      Una criatura que falle su tirada de salvación no recordará que la has hechizado.
    fuente:
      libro: Reglamento básico
      pagina: 304
    verificacion:
      estado: verificado_pdf_local
