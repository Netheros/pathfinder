  - nombre: Protección contra el mal
    alias_en_ingles: Protection From Evil
    nivel: 1
    escuela: Abjuración
    subescuela:
    descriptores:
    - bueno
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M/FD
      materiales:
    alcance: toque
    objetivo: criatura tocada
    efecto:
    area:
    duracion: 1 minuto/nivel (D)
    cancelable: true
    tirada_de_salvacion: Voluntad niega (inofensivo)
    resistencia_a_conjuros: no; ver texto
    descripcion: Este conjuro protege a una criatura contra los ataques y el control
      mental de las criaturas malignas, y contra las propias criaturas de ese alineamiento
      que hayan sido convocadas. El conjuro crea una barrera mágica que rodea al receptor
      a 1 pie (30 cm) de distancia, se desplaza con él, y tiene tres efectos principales.
      En primer lugar, el receptor obtiene un bonificador +2 por desvío a la CA, y
      un bonificador +2 por resistencia a las salvaciones. Ambos bonificadores se
      aplican a los ataques efectuados por criaturas malignas. En segundo lugar, la
      barrera concede de inmediato una nueva tirada de salvación (si se permitía una)
      contra todo conjuro o efecto que posee o ejerce control mental, incluyendo efectos
      de encantamiento (hechizo) y de encantamiento (compulsión), como hechizar persona,
      orden imperiosa y dominar persona, con un bonificador +2 por moral, utilizando
      la misma CD que el efecto original. Si tiene éxito, dichos efectos quedan suprimidos
      durante la duración del conjuro, y se reanudan cuando expira. Bajo sus efectos,
      el receptor es inmune a cualquier nuevo intento de posesión o de control mental.
      El conjuro no expulsa a una fuerza vital controladora (como un fantasma o un
      lanzador de conjuros que está usando transmigración), pero evita que controlen
      al receptor. Este segundo efecto sólo funciona contra conjuros y efectos de
      conjuro creados por criaturas u objetos malignos, a discreción del DJ. En tercer
      lugar, el conjuro impide que las criaturas malignas convocadas entren en contacto
      físico con la criatura custodiada, lo que hace que fallen los ataques con armas
      naturales de tales criaturas, y que éstas se vean obligadas a retroceder en
      caso de intentar tocar a la criatura custodiada por este efecto. Las criaturas
      convocadas no malignas son inmunes a este efecto. La protección contra el contacto
      finaliza si el receptor ataca a la criatura convocada, o intenta forzar contra
      ella la barrera protectora. La resistencia a conjuros puede permitir a una criatura
      superar esta protección y tocar a la criatura custodiada.
    fuente:
      libro: Reglamento básico
      pagina: 338
    verificacion:
      estado: verificado_pdf_local
