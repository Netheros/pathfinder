  - nombre: Ráfaga de viento
    alias_en_ingles: Gust Of Wind
    nivel: 2
    escuela: Evocación
    subescuela:
    descriptores:
    - aire
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: 60 pies
    objetivo:
    efecto: ráfaga en forma de línea de viento fuerte que emana de ti hasta el límite
      del alcance
    area:
    duracion: 1 asalto
    cancelable: false
    tirada_de_salvacion: Fortaleza niega
    resistencia_a_conjuros: sí
    descripcion: |-
      Este conjuro crea un fuerte chorro de viento (aproximadamente 50 millas por hora) que se origina en ti, afectando a todas las criaturas en su camino. Todas las criaturas voladoras en el área reciben un penalizador -4 a las pruebas de habilidad de Volar. Las criaturas voladoras Menudas o más pequeñas deben superar una prueba de habilidad de Volar (CD 25) o ser empujadas hacia atrás 2d6 × 10 pies y reciben 2d6 puntos de daño. Las criaturas voladoras Pequeñas o menores deben superar una prueba de habilidad de Volar (CD 20) para moverse contra la fuerza del viento.
      Una criatura Menuda o menor que esté en el suelo cae al suelo y es arrastrada 1d4 × 10 pies, recibendo 1d4 puntos de daño atenuado por cada 10 pies. Las criaturas Pequeñas quedan derribadas por la fuerza del viento. Las criaturas Medianas o menores son incapaces de moverse contra la fuerza del viento a menosque superen una prueba de Fuerza (CD 15).
      Las criaturas Grandes o mayores pueden moverse con normalidad contra el efecto de la ráfaga de viento.
      Este conjuro no puede mover criaturas más allá del límite de su alcance. Cualquier criatura, independientemente de su tamaño, recibe un penalizador -4 a los ataques a distancia y pruebas de percepción en el área de una ráfaga de vieno. La fuerza de la ráfaga extingue automáticamente velas, antorchas y llamas similares sin protección.
      También hace que las llamas protegidas, como las de las linternas se agiten violentamente y hay un 50% de probabilidades de apagarlas también.
      Además de los efectos indicados, una ráfaga de viento puede hacer cualquier cosa que un repentino chorro de viento podría hacer. Puede crear un doloroso chorro de arena o polvo, avivar un gran fuego, volcar toldos o colgantes pequeños, escorar un bote pequeño y empujar gases o vapores hasta el límite de su alcance.
      Ráfaga de viento puede se hecho permanente con un conjuro de permanencia.
    fuente:
      libro: Reglamento básico
      pagina: 342
    verificacion:
      estado: verificado_pdf_local
  - nombre: Terribles carcajadas
    alias_en_ingles: Hideous Laughter
    nivel: 2
