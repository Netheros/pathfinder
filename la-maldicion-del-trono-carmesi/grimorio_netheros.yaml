  - nombre: Asesino fantasmal
    alias_en_ingles: Phantasmal Killer
    nivel: 4
    escuela: Ilusión
    subescuela: fantasma
    descriptores:
    - miedo
    - enajenador
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
