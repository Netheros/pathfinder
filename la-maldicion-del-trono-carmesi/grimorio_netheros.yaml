    cancelable: false
    tirada_de_salvacion: Fortitude negates (harmless)
    resistencia_a_conjuros: yes (harmless)
    descripcion: Protection from energy grants temporary immunity to the type of energy
      you specify when you cast it (acid, cold, electricity, fire, or sonic). When
      the spell absorbs 12 points per caster level of energy damage (to a maximum
      of 120 points at 10th level), it is discharged. Protection from energy overlaps
      (and does not stack with) resist energy. If a character is warded by protection
      from energy and resist energy, the protection spell absorbs damage until its
      power is exhausted.
