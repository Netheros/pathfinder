  - nombre: Escudriñamiento
    alias_en_ingles: Scrying
    nivel: 4
    escuela: Adivinación
    subescuela: escudriñamiento
    descriptores: []
    tiempo_de_lanzamiento: 1 hora
    componentes:
      abreviatura: V, S, M/FD
      materiales: estanque de agua), F (un espejo de plata valorado en 1.000 po
    alcance: ver texto
    objetivo:
    efecto: sensor mágico
