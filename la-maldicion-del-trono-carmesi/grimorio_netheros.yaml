    alcance: long (400 ft. + 40 ft./level)
    objetivo:
    efecto:
    area: 20-ft.-radius spread
    duracion: instantaneous
    cancelable: false
    tirada_de_salvacion: Reflex half
    resistencia_a_conjuros: sí
    descripcion: A fireball spell generates a searing explosion of flame that detonates
      with a low roar and deals 1d6 points of fire damage per caster level (maximum
      10d6) to every creature within the area. Unattended objects also take this damage.
      The explosion creates almost no pressure. You point your finger and determine
      the range (distance and height) at which the fireball is to burst. A glowing,
      pea-sized bead streaks from the pointing digit and, unless it impacts upon a
      material body or solid barrier prior to attaining the prescribed range, blossoms
      into the fireball at that point. An early impact results in an early detonation.
      If you attempt to send the bead through a narrow passage, such as through an
      arrow slit, you must "hit" the opening with a ranged touch attack, or else the
      bead strikes the barrier and detonates prematurely. The fireball sets fire to
      combustibles and damages objects in the area. It can melt metals with low melting
      points, such as lead, gold, copper, silver, and bronze. If the damage caused
      to an interposing barrier shatters or breaks through it, the fireball may continue
      beyond the barrier if the area permits; otherwise it stops at the barrier just
      as any other spell effect does.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Fly
    alias_en_ingles: Fly
    nivel: 3
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, F (a wing feather)
      materiales:
    alcance: touch
    objetivo: creature touched
    efecto:
    area:
    duracion: 1 min./level
    cancelable: false
    tirada_de_salvacion: Will negates (harmless)
    resistencia_a_conjuros: yes (harmless)
    descripcion: The subject can fly at a speed of 60 feet (or 40 feet if it wears
      medium or heavy armor, or if it carries a medium or heavy load). It can ascend
      at half speed and descend at double speed, and its maneuverability is good.
      Using a fly spell requires only as much concentration as walking, so the subject
      can attack or cast spells normally. The subject of a fly spell can charge but
      not run, and it cannot carry aloft more weight than its maximum load, plus any
      armor it wears. The subject gains a bonus on Fly skill checks equal to 1/2 your
      caster level. Should the spell duration expire while the subject is still aloft,
      the magic fails slowly. The subject floats downward 60 feet per round for 1d6
      rounds. If it reaches the ground in that amount of time, it lands safely. If
      not, it falls the rest of the distance, taking 1d6 points of damage per 10 feet
      of fall. Since dispelling a spell effectively ends it, the subject also descends
      safely in this way if the fly spell is dispelled, but not if it is negated by
      an antimagic field.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Haste
    alias_en_ingles: Haste
    nivel: 3
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M (a shaving of licorice root)
      materiales:
    alcance: close (25 ft. + 5 ft./2 levels)
    objetivo: one creature/level, no two of which can be more than 30 ft. apart
    efecto:
    area:
    duracion: 1 round/level
    cancelable: false
    tirada_de_salvacion: Fortitude negates (harmless)
    resistencia_a_conjuros: yes (harmless)
    descripcion: The transmuted creatures move and act more quickly than normal. This
      extra speed has several effects. When making a full attack action, a hasted
      creature may make one extra attack with one natural or manufactured weapon.
      The attack is made using the creature's full base attack bonus, plus any modifiers
      appropriate to the situation. (This effect is not cumulative with similar effects,
      such as that provided by a speed weapon, nor does it actually grant an extra
      action, so you can't use it to cast a second spell or otherwise take an extra
      action in the round.) A hasted creature gains a +1 bonus on attack rolls and
      a +1 dodge bonus to AC and Reflex saves. Any condition that makes you lose your
      Dexterity bonus to Armor Class (if any) also makes you lose dodge bonuses. All
      of the hasted creature's modes of movement (including land movement, burrow,
      climb, fly, and swim) increase by 30 feet, to a maximum of twice the subject's
      normal speed using that form of movement. This increase counts as an enhancement
      bonus, and it affects the creature's jumping distance as normal for increased
      speed. Multiple haste effects don't stack. Haste dispels and counters slow.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
