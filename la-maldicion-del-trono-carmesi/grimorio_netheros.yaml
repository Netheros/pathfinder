  - nombre: Light
    alias_en_ingles: Light
    nivel: 0
    escuela: Evocación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, M/DF (a firefly)
      materiales:
    alcance: touch
    objetivo: object touched
    efecto:
    area:
    duracion: 10 min./level
    cancelable: false
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: This spell causes a touched object to glow like a torch, shedding
      normal light in a 20-foot radius from the point touched, and increasing the
      light level for an additional 20 feet by one step, up to normal light (darkness
      becomes dim light, and dim light becomes normal light). In an area of normal
      or bright light, this spell has no effect. The effect is immobile, but it can
      be cast on a movable object. You can only have one light spell active at any
      one time. If you cast this spell while another casting is still in effect, the
      previous casting is dispelled. If you make this spell permanent (through permanency
      or a similar effect), it does not count against this limit. Light can be used
      to counter or dispel any darkness spell of equal or lower spell level.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Mage Hand
    alias_en_ingles: Mage Hand
    nivel: 0
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S
      materiales:
    alcance: close (25 ft. + 5 ft./2 levels)
    objetivo: one nonmagical, unattended object weighing up to 5 lbs.
    efecto:
    area:
    duracion: concentration
    cancelable: false
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: You point your finger at an object and can lift it and move it at
      will from a distance. As a move action, you can propel the object as far as
      15 feet in any direction, though the spell ends if the distance between you
      and the object ever exceeds the spell's range.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Marca arcana
    alias_en_ingles: Arcane Mark
    nivel: 0
    escuela: Universal
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S
      materiales:
    alcance: touch
    objetivo:
    efecto: one personal rune or mark, all of which must fit within 1 sq. ft.
    area:
    duracion: permanent
    cancelable: false
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: This spell allows you to inscribe your personal rune or mark, which
      can consist of no more than six characters. The writing can be visible or invisible.
      An arcane mark spell enables you to etch the rune upon any substance without
      harm to the material upon which it is placed. If an invisible mark is made,
      a detect magic spell causes it to glow and be visible, though not necessarily
      understandable. See invisibility, true seeing, a gem of seeing, or a robe of
      eyes likewise allows the user to see an invisible arcane mark. A read magic
      spell reveals the words, if any. The mark cannot be dispelled, but it can be
      removed by the caster or by an erase spell. If an arcane mark is placed on a
      living being, the effect gradually fades in about a month. Arcane mark must
      be cast on an object prior to casting instant summons on the same object (see
      that spell DESCRIPTION for details).
    fuente:
      libro: Reglamento básico
      pagina: 319
    verificacion:
      estado: verificado_pdf_local
  - nombre: Mending
    alias_en_ingles: Mending
    nivel: 0
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 10 minutes
    componentes:
      abreviatura: V, S
      materiales:
    alcance: 10 ft.
    objetivo: one object of up to 1 lb./level
    efecto:
    area:
    duracion: instantaneous
    cancelable: false
    tirada_de_salvacion: Will negates (harmless, object)
    resistencia_a_conjuros: yes (harmless, object)
    descripcion: This spell repairs damaged objects, restoring 1d4 hit points to the
      object. If the object has the broken condition, this condition is removed if
      the object is restored to at least half its original hit points. All of the
      pieces of an object must be present for this spell to function. Magic items
      can be repaired by this spell, but you must have a caster level equal to or
      higher than that of the object. Magic items that are destroyed (at 0 hit points
      or less) can be repaired with this spell, but this spell does not restore their
      magic abilities. This spell does not affect creatures (including constructs).
      This spell has no effect on objects that have been warped or otherwise transmuted,
      but it can still repair damage done to such items.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Message
    alias_en_ingles: Message
    nivel: 0
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, F (a piece of copper wire)
      materiales:
    alcance: medium (100 ft. + 10 ft./level)
    objetivo: one creature/level
    efecto:
    area:
    duracion: 10 min./level
    cancelable: false
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: You can whisper messages and receive whispered replies. Those nearby
      can hear these messages with a DC 25 Perception check. You point your finger
      at each creature you want to receive the message. When you whisper, the whispered
      message is audible to all targeted creatures within range. Magical silence,
      1 foot of stone, 1 inch of common metal (or a thin sheet of lead), or 3 feet
      of wood or dirt blocks the spell. The message does not have to travel in a straight
      line. It can circumvent a barrier if there is an open path between you and the
      subject, and the path's entire length lies within the spell's range. The creatures
      that receive the message can whisper a reply that you hear. The spell transmits
      sound, not meaning; it doesn't transcend language barriers. To speak a message,
      you must mouth the words and whisper.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Open/Close
    alias_en_ingles: Open/Close
    nivel: 0
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, F (a brass key)
      materiales:
    alcance: close (25 ft. + 5 ft./2 levels)
    objetivo: object weighing up to 30 lbs. or portal that can be opened or closed
    efecto:
    area:
    duracion: instantaneous
    cancelable: false
    tirada_de_salvacion: Will negates (object)
    resistencia_a_conjuros: yes (object)
    descripcion: You can open or close (your choice) a door, chest, box, window, bag,
      pouch, bottle, barrel, or other container. If anything resists this activity
      (such as a bar on a door or a lock on a chest), the spell fails. In addition,
      the spell can only open and close things weighing 30 pounds or less. Thus, doors,
      chests, and similar objects sized for enormous creatures may be beyond this
      spell's ability to affect.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Prestidigitation
    alias_en_ingles: Prestidigitation
    nivel: 0
    escuela: Universal
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S
      materiales:
    alcance: 10 ft.
    objetivo: see text
    efecto: see text
    area: see text
    duracion: 1 hour
    cancelable: false
    tirada_de_salvacion: see text
    resistencia_a_conjuros:
    descripcion: Prestidigitations are minor tricks that novice spellcasters use for
      practice. Once cast, a prestidigitation spell enables you to perform simple
      magical effects for 1 hour. The effects are minor and have severe limitations.
      A prestidigitation can slowly lift 1 pound of material. It can color, clean,
      or soil items in a 1-foot cube each round. It can chill, warm, or flavor 1 pound
      of nonliving material. It cannot deal damage or affect the concentration of
      spellcasters. Prestidigitation can create small objects, but they look crude
      and artificial. The materials created by a prestidigitation spell are extremely
      fragile, and they cannot be used as tools, weapons, or spell components. Finally,
      prestidigitation lacks the power to duplicate any other spell effects. Any actual
      change to an object (beyond just moving, cleaning, or soiling it) persists only
      1 hour.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
