  - nombre: Esfera flamígera
    alias_en_ingles: Flaming Sphere
    nivel: 2
    escuela: Evocación
    subescuela:
    descriptores:
    - fuego
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M/FD
      materiales: hierro en polvo, sebo y azufre
