    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, F (a bit of fleece)
      materiales:
    alcance: long (400 ft. + 40 ft./level)
    objetivo:
    efecto: visual figment that cannot extend beyond four 10-ft. cubes + one 10-ft.
      cube/level (S)
    area:
    duracion: concentration + 2 rounds
    cancelable: false
    tirada_de_salvacion: Will disbelief (if interacted with)
    resistencia_a_conjuros:
    descripcion: This spell functions like silent image, except that minor image includes
      some minor sounds but not understandable speech.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Mirror Image
    alias_en_ingles: Mirror Image
    nivel: 2
    escuela: Ilusión
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S
      materiales:
    alcance: personal
    objetivo: you
    efecto:
    area:
    duracion: 1 min./level
    cancelable: false
    tirada_de_salvacion:
    resistencia_a_conjuros:
    descripcion: This spell creates a number of illusory doubles of you that inhabit
      your square. These doubles make it difficult for enemies to precisely locate
      and attack you. When mirror image is cast, 1d4 images plus one image per three
      caster levels (maximum eight images total) are created. These images remain
      in your space and move with you, mimicking your movements, sounds, and actions
      exactly. Whenever you are attacked or are the target of a spell that requires
      an attack roll, there is a possibility that the attack targets one of your images
      instead. If the attack is a hit, roll randomly to see whether the selected target
      is real or a figment. If it is a figment, the figment is destroyed. If the attack
      misses by 5 or less, one of your figments is destroyed by the near miss. Area
      spells affect you normally and do not destroy any of your figments. Spells and
      effects that do not require an attack roll affect you normally and do not destroy
      any of your figments. Spells that require a touch attack are harmlessly discharged
      if used to destroy a figment. An attacker must be able to see the figments to
      be fooled. If you are invisible or the attacker is blind, the spell has no effect
      (although the normal miss chances still apply).
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Resist Energy
    alias_en_ingles: Resist Energy
    nivel: 2
    escuela: Abjuración
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, DF
      materiales:
    alcance: touch
    objetivo: creature touched
    efecto:
    area:
    duracion: 10 min./level
    cancelable: false
    tirada_de_salvacion: Fortitude negates (harmless)
    resistencia_a_conjuros: yes (harmless)
    descripcion: 'This abjuration grants a creature limited protection from damage
      of whichever one of five energy types you select: acid, cold, electricity, fire,
      or sonic. The subject gains resist energy 10 against the energy type chosen,
      meaning that each time the creature is subjected to such damage (whether from
      a natural or magical source), that damage is reduced by 10 points before being
      applied to the creature''s hit points. The value of the energy resistance granted
      increases to 20 points at 7th level and to a maximum of 30 points at 11th level.
      The spell protects the recipient''s equipment as well. Resist energy absorbs
      only damage. The subject could still suffer unfortunate side effects. Resist
      energy overlaps (and does not stack with) protection from energy. If a character
      is warded by protection from energy and resist energy, the protection spell
      absorbs damage until its power is exhausted.'
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Rope Trick
    alias_en_ingles: Rope Trick
    nivel: 2
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M (powdered corn and a twisted loop of parchment)
      materiales:
    alcance: touch
    objetivo: one touched piece of rope from 5 ft. to 30 ft. long
    efecto:
    area:
    duracion: 1 hour/level
    cancelable: true
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: When this spell is cast upon a piece of rope from 5 to 30 feet long,
      one end of the rope rises into the air until the whole rope hangs perpendicular
      to the ground, as if affixed at the upper end. The upper end is, in fact, fastened
      to an extradimensional space that is outside the usual multiverse of extradimensional
      spaces. Creatures in the extradimensional space are hidden, beyond the reach
      of spells (including divinations), unless those spells work across planes. The
      space holds as many as eight creatures (of any size). The rope cannot be removed
      or hidden. The rope can support up to 16,000 pounds. A weight greater than that
      can pull the rope free. Spells cannot be cast across the extradimensional interface,
      nor can area effects cross it. Those in the extradimensional space can see out
      of it as if a 3-foot-by-5-foot window were centered on the rope. The window
      is invisible, and even creatures that can see the window can't see through it.
      Anything inside the extradimensional space drops out when the spell ends. The
      rope can be climbed by only one person at a time. The rope trick spell enables
      climbers to reach a normal place if they do not climb all the way to the extradimensional
      space.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Scare
    alias_en_ingles: Scare
    nivel: 2
    escuela: Nigromancia
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M (a bone from an undead creature)
      materiales:
    alcance: medium (100 ft. + 10 ft./level)
    objetivo: one living creature per three levels, no two of which can be more than
      30 ft. apart
    efecto:
    area:
    duracion: 1 round/level or 1 round; see text for cause fear
    cancelable: false
    tirada_de_salvacion: Will partial
    resistencia_a_conjuros: sí
    descripcion: This spell functions like cause fear, except that it causes all targeted
      creatures of less than 6 HD to become frightened.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Scorching Ray
