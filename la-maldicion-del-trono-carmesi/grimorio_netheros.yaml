  - nombre: Wall Of Fire
    alias_en_ingles: Wall Of Fire
    nivel: 4
    escuela: Evocación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M/DF (a piece of phosphor)
      materiales:
    alcance: medium (100 ft. + 10 ft./level)
    objetivo:
    efecto: opaque sheet of flame up to 20 ft. long/level or a ring of fire with a
      radius of up to 5 ft./two levels; either form 20 ft. high
    area:
    duracion: concentration + 1 round/level
    cancelable: false
    tirada_de_salvacion: none
    resistencia_a_conjuros: sí
    descripcion: An immobile, blazing curtain of shimmering violet fire springs into
      existence. One side of the wall, selected by you, sends forth waves of heat,
      dealing 2d4 points of fire damage to creatures within 10 feet and 1d4 points
      of fire damage to those past 10 feet but within 20 feet. The wall deals this
      damage when it appears, and to all creatures in the area on your turn each round.
      In addition, the wall deals 2d6 points of fire damage + 1 point of fire damage
      per caster level (maximum +20) to any creature passing through it. The wall
      deals double damage to undead creatures. If you evoke the wall so that it appears
      where creatures are, each creature takes damage as if passing through the wall.
      If any 5-foot length of wall takes 20 points or more of cold damage in 1 round,
      that length goes away. (Do not divide cold damage by 2, as normal for objects.)
      Wall of fire can be made permanent with a permanency spell. A permanent wall
      of fire that is extinguished by cold damage becomes inactive for 10 minutes,
      then reforms at normal strength.
