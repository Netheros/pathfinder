      Un viento moderado (11+ millas por hora), como el de un conjuro de ráfaga de viento, dispersa la niebla en 4 asaltos. Un viento fuerte (21+ millas por hora) dispersa la niebla en 1 asalto. Una bola de fuego, descarga flamígera o conjuro similar quema la niebla en el área del conjuro. Un muro de fuego quema la niebla en el área en que causa daño.
