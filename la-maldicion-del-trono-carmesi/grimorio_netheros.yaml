    area:
    duracion: 1 hora/nivel
    cancelable: false
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Creas un plano circular de fuerza ligéramente cóncavo que te sigue y transporta cargas para ti. El disco mide 3 pies de diámetro y tiene 1 pulgada de profundidad en su centro. Puede cargar 100 libras de peso por nivel del lanzador. Si se usa para transportar un líquido, su capacidad es de 2 galones. El disco flota aproximadamente a 3 pies sobre el suelo y siempre permanece equilibrado. Flota horizontalmente dentro del alcance del conjuro y te acompaña a un índice de no más que tu velocidad normal cada asalto.. Si no se le dirige de otra forma, mantiene a una distancia constante a 5 pies entre tú y él.
      El disco se desvanece de la existencia cuando la duración del conjuro finaliza. También se desvanece si te mueves más lejos de su alcance o si llevas el disco a más de 3 pies de la distancia de la superficie que hay bajo él.
      Cuando el disco se desvanece, todo lo que esté aguantando cae al suelo bajo él.
    fuente:
      libro: Reglamento básico
      pagina: 282
    verificacion:
      estado: verificado_pdf_local
