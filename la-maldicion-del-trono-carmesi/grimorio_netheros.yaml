---
grimorio:
  propietario: Netheros
  conjuros:
  - nombre: Salpicadura de ácido
    alias_en_ingles: Acid Splash
    nivel: 0
    escuela: Conjuración
    subescuela: creación
    descriptores:
    - ácido
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: corto (25 pies + 5 pies/2 niveles)
    objetivo:
    efecto: un misil de ácido
    area:
    duracion: instantáneo
    cancelable: false
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: Disparas un pequeño orbe de ácido a un objetivo. Debes tener éxito
      en un ataque de toque a distancia para impactar a tu objetivo. El orbe hace
      1d3 puntos de daño por ácido. Este ácido desaparece tras 1 asalto.
    fuente:
      libro: Reglamento básico
      pagina: 354
    verificacion:
      estado: verificado_pdf_local
  - nombre: Sangrar
    alias_en_ingles: Bleed
    nivel: 0
    escuela: Nigromancia
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: corto (25 pies + 5 pies/2 niveles)
    objetivo: una criatura viva
    efecto:
    area:
    duracion: instantáneo
    cancelable: false
    tirada_de_salvacion: Voluntad niega
    resistencia_a_conjuros: sí
    descripcion: Haces que una criatura viva que esté por debajo de 0 puntos de golpe
      pero estabilizada vuelva a estar moribunda. Al lanzar este conjuro, eliges una
      criatura que tenga -1 puntos de golpe o menos. Esa criatura queda moribunda,
      recibiendo 1 punto de daño por asalto. La criatura puede estabilizarse más tarde
      de la forma normal. Este conjuro hace que una criatura que ya esté moribunda
      reciba 1 punto de daño.
    fuente:
      libro: Reglamento básico
      pagina: 355
    verificacion:
      estado: verificado_pdf_local
  - nombre: Luces danzantes
    alias_en_ingles: Dancing Lights
    nivel: 0
    escuela: Evocación
    subescuela:
    descriptores:
    - luz
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: intermedio (100 pies + 10 pies/nivel)
    objetivo:
    efecto: hasta cuatro luces, todas ellas en un área de 10 pies de radio
    area:
    duracion: 1 minuto
    cancelable: false
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Dependiendo de la versión por la que te inclines, crearás hasta cuatro luces que podrás utilizar de linternas o antorchas (y despedirán la misma cantidad de luz que estos objetos de iluminación), hasta cuatro esferas de luz brillante (que tendrán el aspecto de fuegos fatuos) o una figura vagamente humanoide y de brillo tenue. Las Luces danzantes deberán mantenerse unas respecto de las otras en un área de 10 pies de radio, pero, por lo demás, podrán moverse como desees (sin necesidad de concentración): adelante o atrás, arriba o abajo, en línea recta o dando la vuelta a esquinas, etc. Las luces pueden desplazarse hasta 100 pies por asalto; aquellas que se separen de ti más allá del alcance máximo del conjuro desaparecerán inmediatamente.
      Sólo puedes tener un conjuro de Luces danzantes activo a la vez. Si lanzas este conjuro mientras otro está aun activo, el anterior se disipará. Si haces este conjuro permanente, no contará para este limite.
      Luces danzantes puede hacerse permanente con un conjuro de Permanencia .
    fuente:
      libro: Reglamento básico
      pagina: 316
    verificacion:
      estado: verificado_pdf_local
  - nombre: Atontar
    alias_en_ingles: Daze
    nivel: 0
    escuela: Encantamiento
    subescuela: compulsión
    descriptores:
    - enajenador
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M
      materiales: unas hebras liadas de lana u otro material similar
    alcance: corto (25 pies + 5 pies/2 niveles)
    objetivo: una criatura humanoide de 4 DG o menos
    efecto:
    area:
    duracion: 1 asalto
    cancelable: false
    tirada_de_salvacion: Voluntad niega
    resistencia_a_conjuros: si
    descripcion: Este conjuro nublará la mente de una criatura humanoide de 4 DG o
      menos impidiéndole llevar a cabo acción alguna. Los humanoides de 5 o más DG
      no son afectados. El receptor atontado no estará aturdido, por tanto quienes
      intenten agredirle no obtendrán beneficios especiales en sus ataques. Después
      de que una criatura quede atontada por este conjuro, será inmune al mismo durante
      1 minuto.
    fuente:
      libro: Reglamento básico
      pagina: 247
    verificacion:
      estado: verificado_pdf_local
  - nombre: Detectar magia
    alias_en_ingles: Detect Magic
    nivel: 0
    escuela: Adivinación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: 60'
    objetivo:
    efecto:
    area: emanación en forma de cono
    duracion: concentración, hasta 1 min./nivel (D)
    cancelable: true
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Detectas auras mágicas. La cantidad de información revelada de pende de cuánto tiempo estudies un área o sujeto en particular.
      Asalto 1: presencia o ausencia de auras mágicas. Asalto 2: número de auras mágicas diferentes y el poder del aura más potente. Asalto 3: la fuerza y localización de cada aura. Si el objeto o criatura que tenga el aura está en tu línea de visión, puedes hacer pruebas de habilidad de Saber (arcano) para determinar la escuela de magia implicada en cada una (haz una prueba por aura, CD 15 + nivel de conjuro, o 15 + la mitad del nivel de lanzador para efectos que no sean conjuros). Si el aura emana de un objeto mágico, puedes tratar de identificar sus propiedades (ver la habilidad de Conocimiento de Conjuros).
      Áreas mágicas, múltiples tipos de magia o emanaciones mágicas fuertes pueden distorsionar u ocultar auras más débiles.
      Fuerza del aura: el poder de un aura depende del nivel de un conjuro activo o del nivel de lanzador de un objeto; ver la tabla a continuación. Si el aura entra en más de una categoría, detectar magia indica la más fuerte de las dos.
      Aura residual: un aura mágica deja un resíduo después de que su fuente original se disipe (en el caso de un conjuro) o sea destruido (en el caso de un objeto mágico). Si detectar magia se lanza y se dirige hacia esa clase de lugar, el conjuro indica un aura tenue (incluso más débil que un aura débil). El tiempo que un aura permanezca con ese nivel tenue depende de su poder original:
      Los ajenos y los elementales no son mágicos en sí mismos, pero pero si son convocados, puede detectarse el sortilegio de conjuración. Cada asalto puedes cambiar el área a examinar. El conjuro puede traspasar barreras, pero 1 pie de piedra, 1 pulgada de metal, una fina lámina de plomo o 3 pies de madera o tierra lo bloquean.
      Detectar magia puede hacerse permanente con un conjuro de permanencia.
    fuente:
      libro: Reglamento básico
      pagina: 281
    verificacion:
      estado: verificado_pdf_local
  - nombre: Detectar veneno
    alias_en_ingles: Detect Poison
    nivel: 0
    escuela: Adivinación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: corto ( 25 pies + 5 pies/2 niveles)
    objetivo: o área una criatura, un objeto o un cubo de 5 pies
    efecto:
    area:
    duracion: instantáneo
    cancelable: false
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: Determinas si una criatura, objeto o área ha sido envenenada o es
      venenosa. Puedes determinar el tipo exacto de veneno con una prueba de Sabiduría
      CD 20. Un personaje con la habilidad de Artesanía (Alquimia) puede intentar
      una prueba de Artesanía (Alquimia) con CD 20 si falla la prueba de Sabiduría,
      o puede intentar la prueba de Artesanía (Alquimia) antes de la prueba de Sabiduría.
      El conjuro puede penetrar barreras, pero 1 pie de piedra, 1 pulgada de metal
      común, un delgada lámina de plomo o 3 pies de madera o tierra lo bloquean.
    fuente:
      libro: Reglamento básico
      pagina: 281
    verificacion:
      estado: verificado_pdf_local
  - nombre: Perturbar muertos vivientes
    alias_en_ingles: Disrupt Undead
    nivel: 0
    escuela: Nigromancia
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: corto (25 pies + 5 pies/2 niveles)
    objetivo:
    efecto: rayo
    area:
    duracion: instantáneo
    cancelable: false
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: si
    descripcion: ''
    fuente:
      libro: Reglamento básico
      pagina: 333
    verificacion:
      estado: verificado_pdf_local
  - nombre: Llamarada
    alias_en_ingles: Flare
    nivel: 0
    escuela: Evocación
    subescuela:
    descriptores:
    - luz
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V
      materiales:
    alcance: corto (25 pies + 5 pies/2 niveles)
    objetivo:
    efecto: explosión de luz
    area:
    duracion: instantáneo
    cancelable: false
    tirada_de_salvacion: fortaleza niega
    resistencia_a_conjuros: si
    descripcion: Este truco crea una explosión de luz brillante. Si haces que el efecto
      se produzca justo delante de una única criatura, ésta quedará deslumbrada (dazzled)
      durante 1 minuto a no ser que tenga éxito en una salvación de Fortaleza. Las
      criaturas ciegas, así como las que ya estén deslumbradas, no resultan afectadas
      por la llamarada.
    fuente:
      libro: Reglamento básico
      pagina: 315
    verificacion:
      estado: verificado_pdf_local
  - nombre: Sonido fantasma
    alias_en_ingles: Ghost Sound
    nivel: 0
    escuela: Ilusión
    subescuela: quimera
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M
      materiales: un trozo de lana y un poco de cera
    alcance: toque
    objetivo:
    efecto: sonidos ilusorios
    area:
    duracion: 1 asalto/nivel (D)
    cancelable: true
    tirada_de_salvacion: Voluntad descree
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Sonido fantasma te permite crear un volumen de sonido que se eleve, disminuya, se acerque o se quede quieto en un sitio. Puedes elegir qué tipo de sonido creado en el momento de ejecutar el sortilegio, pero después no podrás cambiar el carácter básico del mismo.
      Sin embargo, el volumen del sonido creado dependerá de tu nivel: podrás generar el mismo ruido que cuatro humanos normales por nivel de lanzador que poseas (máximo 40 humanos). Por tanto, podrás crear sonidos de charla, canto, gritos, pasos, marcha o carrera. El sonido producido por este conjuro puede ser prácticamente de cualquier tipo, sin exceder nunca el límite de volumen. Una horda de ratas corriendo y chillando equivaldría a 8 humanos corriendo y gritando. El rugido de un león equivaldría al ruido de 16 humanos, mientras que el rugido de un dragón equivale al de 32 humanos.
      Cualquiera que oiga un Sonido fantasma hará una tirada de Voluntad para descreer.
      Sonido fantasma puede mejorar la eficacia del conjuro imagen silenciosa.
      Sonido fantasma puede hacerse permanente con un conjuro de permanencia.
    fuente:
      libro: Reglamento básico
      pagina: 359
    verificacion:
      estado: verificado_pdf_local
  - nombre: Haunted Fey Aspect
    alias_en_ingles: Haunted Fey Aspect
    nivel: 0
    escuela: Ilusión
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: S
      materiales:
    alcance: personal
    objetivo: tú
    efecto:
    area:
    duracion: 1 asalto/nivel (D)
    cancelable: true
    tirada_de_salvacion:
    resistencia_a_conjuros:
    descripcion: Te rodeas de ilusiones perturbadoras, haciendo que parezcas y suenes
      como una criatura feérica extraña y demente. Obtienes RD 1/hierro frío contra
      un solo oponente hasta el final del conjuro o hasta que recibas daño.
    fuente:
      libro: Combate definitivo
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Luz
    alias_en_ingles: Light
    nivel: 0
    escuela: Evocación
    subescuela:
    descriptores:
    - Luz
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, M/FD
      materiales: una luciérnaga
    alcance: toque
    objetivo: objeto tocado
    efecto:
    area:
    duracion: 10 min/nivel
    cancelable: false
    tirada_de_salvacion: ninguna
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Este conjuro hace que un objeto brille como una antorcha, despidiendo luz normal en un radio de 20 pies , e incrementando el nivel de luz en otros 20 pies adicionales en un paso, hasta luz normal (oscuridad se convierte en luz tenue, y luz tenue se convierte en luz normal). En un área con luz normal o brillante, este conjuro no tiene efecto. El efecto es inmóvil, pero puede lanzarse sobre un objeto móvil.
      Solo puede tener un conjuro de Luz activo al mismo tiempo. Si lanzas este conjuro mientras aún persiste el efecto de otro, el anterior conjuro se disipará. Si haces este conjuro permanente (mediante permanencia o un efecto similar), no cuenta para este límite. Luz puede usarse para contrarrestar o disipar cualquier conjuro de oscuridad de igual o menor nivel.
    fuente:
      libro: Reglamento básico
      pagina: 316
    verificacion:
      estado: verificado_pdf_local
  - nombre: Mano del mago
    alias_en_ingles: Mage Hand
    nivel: 0
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: corto (25 pies + 5 pies/2 niveles)
    objetivo: objeto desatendido y no mágico de hasta 5 lb de peso
    efecto:
    area:
    duracion: concentración
    cancelable: false
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: Señalas un objeto con tu dedo y el conjuro te permite elevarlo y
      moverlo desde lejos. Usando una acción equivalente a moverse, podrás desplazarlo
      hasta 15 pies en cualquier dirección, aunque el efecto finalizaría si el objeto
      en cuestión llegara a exceder en cualquier momento el alcance del sortilegio.
    fuente:
      libro: Reglamento básico
      pagina: 318
    verificacion:
      estado: verificado_pdf_local
  - nombre: Marca arcana
    alias_en_ingles: Arcane Mark
    nivel: 0
    escuela: Universal
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: toque
    objetivo:
    efecto: una runa o marca personal, que debe ocupar como máx. 1 pie cuadrado
    area:
    duracion: permanente
    cancelable: false
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Este conjuro te permite inscribir tu runa o marca personal, que no puede estar formada por más de 6 caracteres. La escritura puede ser visible o invisible. El conjuro marca arcana te permite grabar tu runa sobre cualquier sustancia sin causar daño al material. Si grabaras una marca invisible, un conjuro de detectar magia la haría brillar y volverse visible (aunque no necesariamente comprensible).
      Ver lo invisible, Visión verdadera , una gema de visión o una túnica de los ojos permitirán a los usuarios ver una marca arcana invisible. Un conjuro de leer magia revelará las palabras en caso de haberlas. La marca no puede ser disipada, pero puede ser eliminada por su lanzador o por un conjuro de borrar .
      Si la marca fuera grabada sobre una criatura viviente, desaparecería gradualmente al cabo de un mes.
      La marca arcana debe ejecutarse sobre un objeto antes de lanzar sobre el conjuro convocaciones instantáneas (consulta la descripción de este conjuro para obtener mas detalles).
    fuente:
      libro: Reglamento básico
      pagina: 319
    verificacion:
      estado: verificado_pdf_local
  - nombre: Remendar
    alias_en_ingles: Mending
    nivel: 0
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 10 minutos
    componentes:
      abreviatura: V, S
      materiales:
    alcance: 10 pies
    objetivo: un objeto de hasta 1 libra/nivel
    efecto:
    area:
    duracion: instantáneo
    cancelable: false
    tirada_de_salvacion: Voluntad niega (inofensivo, objeto)
    resistencia_a_conjuros: si (inofensivo, objeto)
    descripcion: Este conjuro repara objetos dañados, restaurando 1d4 puntos de golpe
      al objeto. Si el objeto tuviera la condición de roto, esta condición se elimina
      si el objeto recupera al menos la mitad de sus puntos de golpe originales. Todas
      las piezas de un objeto deben estar presentes para que el conjuro funcione.
      Los objetos mágicos se pueden reparar mediante este conjuro, pero debes tener
      un nivel de lanzador igual o mayor que el del objeto. Los objetos mágicos que
      son destruidos (0 puntos de golpe o menos) pueden ser reparados con este conjuro,
      pero no restaurará sus propiedades mágicas. Este conjuro no afecta a criaturas
      (incluyendo constructos). Este conjuro no tiene efecto sobre objetos que han
      sido doblados o transmutados de alguna otra manera, pero aun así pueden reparar
      el daño causado a dichos objetos.
    fuente:
      libro: Reglamento básico
      pagina: 347
    verificacion:
      estado: verificado_pdf_local
  - nombre: Cuchichear mensaje
    alias_en_ingles: Message
    nivel: 0
    escuela: Transmutación
    subescuela:
    descriptores:
    - dependiente del idioma
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, F
      materiales: un trozo de alambre de cobre
    alcance: medio (100 pies + 10 pies/nivel)
    objetivo: una criatura/nivel
    efecto:
    area:
    duracion: 10 min/nivel
    cancelable: false
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: Puedes susurrar mensajes y recibir respuesta. Los que estén cerca
      pueden oír los mensajes con una prueba de Percepción (CD 25). Debes apuntar
      con el dedo a cada criatura que quieres que reciba el mensaje. Cuando susurras,
      el mensaje susurrado es audible para todas las criaturas objetivo dentro del
      alcance. El silencio mágico, 1 pie de piedra, 1 pulgada de metal corriente,
      o 3 pies de madera o tierra bloquean el conjuro. El mensaje no tiene por qué
      viajar en línea recta. Puede rodear un obstáculo si hay un camino libre entre
      tu objetivo y tú, y la longitud del camino no supera el alcance del conjuro.
      Las criaturas que reciben el mensaje pueden susurrar una respuesta a tu oído.
      El conjuro transmite sonido, no la intención; no trasciende la barrera del lenguaje.
      Para pronunciar el mensaje, debes poder vocalizar las palabras y susurrar.
    fuente:
      libro: Reglamento básico
      pagina: 272
    verificacion:
      estado: verificado_pdf_local
  - nombre: Abrir/cerrar
    alias_en_ingles: Open/Close
    nivel: 0
    escuela: transmutación; Nivel bardo 0, convocador 0, hechicero/mago 0, magus 0
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, F
      materiales: una llave de bronce
    alcance: corto (25 pies + 5 pies/2 niveles)
    objetivo: objeto con un peso máximo de 30 libras o portal que pueda ser abierto
      o cerrado
    efecto:
    area:
    duracion: instantáneo
    cancelable: false
    tirada_de_salvacion:
    resistencia_a_conjuros: sí (objeto)
    descripcion: Puedes abrir o cerrar (a tu elección) una puerta, cofre, caja, ventana,
      bolsa, saco, botella, barril u otro contenedor. Si algo se resiste a esta actividad
      (como una barra en una puerta o una cerradura en un cofre), el conjuro falla.
      Además, el conjuro sólo puede abrir y cerrar cosas que pesen 30 libras o menos.
      Por tanto, puertas, cofres y objetos similares diseñados para criaturas Enormes
      podrían estar más allá de la capacidad de este conjuro para afectarlos.
    fuente:
      libro: Reglamento básico
      pagina: 240
    verificacion:
      estado: verificado_pdf_local
  - nombre: Prestidigitación
    alias_en_ingles: Prestidigitation
    nivel: 0
    escuela: Universal
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: 10 pies
    objetivo:
    efecto:
    area:
    duracion: 1 hora
    cancelable: false
    tirada_de_salvacion: ver texto
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Las prestidigitaciones son trucos menores que los lanzadores de conjuros novatos realizan para practicar. Una vez ejecutado, el sortilegio de prestidigitación te permite llevar a cabo efectos mágicos sencillos durante 1 hora. Tales efectos serán mejores y estarán enormemente limitados. Las prestidigitaciones pueden elevar lentamente 1 libra de material; pueden colorear, limpiar o manchar objetos en un cubo de 1 pie de lado por asalto; pueden enfriar, calentar o dar sabor a una libra de material inerte; no pueden infligir daño ni romper la concentración de un lanzador de conjuros.
      La prestidigitación puede crear pequeños objetos, pero estos parecerán toscos y artificiales. Los materiales creados mediante este sortilegio serán extremadamente frágiles y no podrán ser utilizados como herramientas, armas ni componentes de conjuro. Por último, la prestidigitación carece de poder para duplicar los efectos de otros conjuros. Todo cambio realizado sobre un objeto (que no se limite a moverlo, limpiarlo o ensuciarlo) durará solamente 1 hora.
    fuente:
      libro: Reglamento básico
      pagina: 337
    verificacion:
      estado: verificado_pdf_local
  - nombre: Rayo de escarcha
    alias_en_ingles: Ray of Frost
    nivel: 0
    escuela: Evocación
    subescuela:
    descriptores:
    - frío
