  - nombre: Web
    alias_en_ingles: Web
    nivel: 2
    escuela: Conjuración
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M (spider web)
      materiales:
    alcance: medium (100 ft. + 10 ft./level)
    objetivo:
    efecto: webs in a 20-ft.-radius spread
    area:
    duracion: 10 min./level (D)
    cancelable: true
    tirada_de_salvacion: Reflex negates; see text
    resistencia_a_conjuros:
    descripcion: Web creates a many-layered mass of strong, sticky strands. These
      strands trap those caught in them. The strands are similar to spiderwebs but
      far larger and tougher. These masses must be anchored to two or more solid and
      diametrically opposed points or else the web collapses upon itself and disappears.
      Creatures caught within a web become grappled by the sticky fibers. Attacking
      a creature in a web doesn't cause you to become grappled. Anyone in the effect's
      area when the spell is cast must make a Reflex save. If this save succeeds,
      the creature is inside the web but is otherwise unaffected. If the save fails,
      the creature gains the grappled condition, but can break free by making a combat
      maneuver check or Escape Artist check as a standard action against the DC of
      this spell. The entire area of the web is considered difficult terrain. Anyone
      moving through the webs must make a combat maneuver check or Escape Artist check
      as part of their move action, with a DC equal to the spell's DC. Creatures that
      fail lose their movement and become grappled in the first square of webbing
      that they enter. If you have at least 5 feet of web between you and an opponent,
      it provides cover. If you have at least 20 feet of web between you, it provides
      total cover. The strands of a web spell are flammable. A flaming weapon can
      slash them away as easily as a hand brushes away cobwebs. Any fire can set the
      webs alight and burn away one 5-foot square in 1 round. All creatures within
      flaming webs take 2d4 points of fire damage from the flames. Web can be made
      permanent with a permanency spell. A permanent web that is damaged (but not
      destroyed) regrows in 10 minutes.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Dispel Magic
    alias_en_ingles: Dispel Magic
    nivel: 3
    escuela: Abjuración
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S
      materiales:
    alcance: medium (100 ft. + 10 ft./level)
    objetivo: one spellcaster, creature, or object
    efecto:
    area: one spellcaster, creature, or object
    duracion: instantaneous
    cancelable: false
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: 'You can use dispel magic to end one ongoing spell that has been
      cast on a creature or object, to temporarily suppress the magical abilities
      of a magic item, or to counter another spellcaster''s spell. A dispelled spell
      ends as if its duration had expired. Some spells, as detailed in their descriptions,
      can''t be defeated by dispel magic. Dispel magic can dispel (but not counter)
      spell-like effects just as it does spells. The of a spell with an instantaneous
      duration can''t be dispelled, because the magical effect is already over before
      the dispel magic can take effect. You choose to use dispel magic in one of two
      ways: a targeted dispel or a counterspell. Targeted Dispel: One object, creature,
      or spell is the target of the dispel magic spell. You make one dispel check
      (1d20 + your caster level) and compare that to the spell with highest caster
      level (DC = 11 + the spell''s caster level). If successful, that spell ends.
      If not, compare the same result to the spell with the next highest caster level.
      Repeat this process until you have dispelled one spell affecting the target,
      or you have failed to dispel every spell. For example, a 7th-level caster casts
      dispel magic, targeting a creature affected by stoneskin (caster level 12th)
      and fly (caster level 6th). The caster level check results in a 19. This check
      is not high enough to end the stoneskin (which would have required a 23 or higher),
      but it is high enough to end the fly (which only required a 17). Had the dispel
      check resulted in a 23 or higher, the stoneskin would have been dispelled, leaving
      the fly intact. Had the dispel check been a 16 or less, no spells would have
      been affected. You can also use a targeted dispel to specifically end one spell
      affecting the target or one spell affecting an area (such as a wall of fire).
      You must name the specific spell effect to be targeted in this way. If your
      caster level check is equal to or higher than the DC of that spell, it ends.
      No other spells or effects on the target are dispelled if your check is not
      high enough to end the targeted effect. If you target an object or creature
      that is the effect of an ongoing spell (such as a monster summoned by summon
      monster), you make a dispel check to end the spell that conjured the object
      or creature. If the object that you target is a magic item, you make a dispel
      check against the item''s caster level (DC = 11 + the item''s caster level).
      If you succeed, all the item''s magical properties are suppressed for 1d4 rounds,
      after which the item recovers its magical properties. A suppressed item becomes
      nonmagical for the duration of the effect. An interdimensional opening (such
      as a bag of holding) is temporarily closed. A magic item''s physical properties
      are unchanged: A suppressed magic sword is still a sword (a masterwork sword,
      in fact). Artifacts and deities are unaffected by mortal magic such as this.
      You automatically succeed on your dispel check against any spell that you cast
      yourself. Counterspell: When dispel magic is used in this way, the spell targets
      a spellcaster and is cast as a counterspell. Unlike a true counterspell, however,
      dispel magic may not work; you must make a dispel check to counter the other
      spellcaster''s spell.'
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
