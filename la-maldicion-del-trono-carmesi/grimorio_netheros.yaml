  - nombre: Locate Creature
    alias_en_ingles: Locate Creature
    nivel: 4
    escuela: Adivinación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M (fur from a bloodhound)
      materiales:
    alcance: long (400 ft. + 40 ft./level)
    objetivo:
    efecto:
    area: circle, centered on you, with a radius of 400 ft. + 40 ft./level
    duracion: 10 min./level
    cancelable: false
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: This spell functions like locate object, except this spell locates
      a known creature. You slowly turn and sense when you are facing in the direction
      of the creature to be located, provided it is within range. You also know in
      which direction the creature is moving, if any. The spell can locate a creature
      of a specific kind or a specific creature known to you. It cannot find a creature
      of a certain type. To find a kind of creature, you must have seen such a creature
      up close (within 30 feet) at least once. Running water blocks the spell. It
      cannot detect objects. It can be fooled by mislead, nondetection, and polymorph
      spells.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Phantasmal Killer
