      Una nube de partículas doradas cubre todo lo que hay en el área, haciendo que las criaturas queden cegadas perfilando visiblemente a las cosas invisibles mientras dure el conjuro. Todos en el área quedan cubiertos por el polvo, que no puede quitarse y continúa brillando hasta que se desvanece. Cada asalto al final de su turno, las criaturas cegadas pueden hacer nuevas tiradas de salvación para terminar con el efecto de ceguera.
      Cualquier criatura cubierta por el polvo recibe un penalizador –40 a las pruebas de Sigilo.
    fuente:
      libro: Reglamento básico
      pagina: 331
    verificacion:
