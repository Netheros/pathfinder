      Arma mágica da un bonificador +1 de mejora a un arma a las tiradas de ataque y daño. Un bonificador de mejor no se apila con el bonificador + 1 a las tiradas de ataque de un arma de gran calidad.
      No puedes lanzar este conjuro en un arma natural, como un impacto sin arma (en su lugar, ver colmillo mágico ). El impacto sin arma del monje se considera un arma, por lo que se puede mejorar con este conjuro.
      Arma mágica mayor Magic Weapon, Greater Escuela transmutación Nivel antipaladín 3, clérigo/oráculo 4, hechicero/mago 3, inquisidor 3, paladín 3 Tiempo de lanzamiento 1 acción estándar Componentes V, S, M/FD (cal y carbón en polvo) Alcance corto (25 pies + 5 pies/2 niveles) Objetivo un arma o 50 proyectiles (que deben estar juntos en el momento del lanzamiento) Duración 1 hora/nivel Tiro de salvación Voluntad niega (inofensivo, objeto) Resistencia a conjuros sí (inofensivo, objeto)
      Este conjuro funciona como arma mágica, excepto en que concede al arma un bonificador de mejora a las tiradas de ataque y daño de +1 por cada cuatro niveles (máximo +5).
      Este bonificador no permite a un arma ignorar la reducciónd e daño que no sea mágica.
      Alternativamente, puedes afectar un máximo de 50 flechas, virotes o balas. Los proyectiles deben ser del mismo tipo y deben estar juntos (en el mismo carcaj o contenedor). Los proyectiles, pero no las armas arrojadizas, pierden su transmutación una vez se usan.
      Trata los shurikens como proyectiles en lugar de como armas arrojadizas en lo relativo a este conjuro.
