  - nombre: Comandar muertos vivientes
    alias_en_ingles: Command Undead
    nivel: 2
    escuela: Nigromancia
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M
      materiales: una tira de carne cruda y una astilla de hueso
    alcance: corto (25 pies + 5 pies/2 niveles)
    objetivo: una criatura muerta viviente
    efecto:
    area:
    duracion: 1 día/nivel
    cancelable: false
    tirada_de_salvacion: Voluntad niega; ver texto
    resistencia_a_conjuros: sí
    descripcion: |-
      Este conjuro te permite cierto grado de control sobre una criatura muerta viviente.
      Si el objetivo es inteligente, percibe tus palabras y acciones favorablemente (trata su actitud como amistosa). No te atacará mientras dure el conjuro. Puedes dar órdenes al objetivo, pero debes ganar una prueba enfrentada de Carisma para convencerle para para que haga algo que normalmente no haría. No se permiten reintentos. Un muerto viviente inteligente comandado nunca obedece órdenes suicidad u obviamente dañinas, pero podría ser convencido de que vale la pena hacer algo muy peligroso. Una criatura muerta viviente no inteligente no obtiene tirada de salvación contra este conjuro. Cuando controlas un ser sin mente, puedes comunicar sólo órdenes básicas, como "ven aquí", "ve allí", "lucha", "quédate quieto" y similares. Los muertos vivientes no inteligentes no se resistirán a órdenes suicidas o evitentemente dañinas.
      Cualquier acto tuyo o de los que parezcan tus aliados que amenace al muerto viviente comandado (independientemente de su inteligencia) rompe el conjuro.
      Tus órdenes no son telepáticas. El muerto viviente debe ser capaz de oírte.
    fuente:
      libro: Reglamento básico
      pagina: 260
    verificacion:
      estado: verificado_pdf_local
  - nombre: Crear mapa del tesoro
    alias_en_ingles: Create Treasure Map
    nivel: 2
    escuela: Adivinación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 hora
    componentes:
      abreviatura: V, S, M
      materiales: polvo metálico y tintas raras por valor de 100 po
    alcance: toque
    objetivo: una criatura muerta
    efecto:
    area:
    duracion: instantáneo
    cancelable: false
    tirada_de_salvacion: ninguna
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Puedes tomar una parte del cuerpo de una criatura muerta y usarla para crear un mapa que revela la localización de cualquier objeto de valor que conociera la criatura cuando aún estaba viva. Debes cortar esta pieza tú mismo y la criatura no puede haber muerto más de 24 horas antes del lanzamiento del conjuro. No puedes lanzar este conjuro sobre una criatura sin cuerpo físico, y la porción que extraigas debe disponer de una superficie razonablemente lisa como un trozo de cuero, piel o un caparazón. El mapa que crees es preciso hasta donde pudiera saber la criatura en el momento de su muerte. Revela la localización de una fuente de tesoro por cada tres niveles de lanzador que poseas..
      Cualquier imprecisión o información errónea que tuviera la criatura también se representa en el mapa. De forma similar, el mapa no puede registrar cualquier cambio ocurrido tras la muerte de la criatura.
      Debes elegir la escala del mapa al crearlo, eligiendo entre próximo (p.ej. uno o dos niveles de dungeon), local (un valle o comunidad) o amplio (un país o mayor). El mapa revela las localizaciones de lo que la criatura considerar más valioso en el área. Dependiendo de la criatura, el mapa podría revelar una fuente de comida sabrosa, parejas apropiadas o incluso tu propia cámara del tesoro.
    fuente:
      libro: Guía del jugador avanzada
      pagina:
    verificacion:
      estado: correlacionado_rolroyce
  - nombre: Oscuridad
    alias_en_ingles: Darkness
    nivel: 2
    escuela: Evocación
    subescuela:
    descriptores:
    - oscuridad
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, M/FD
      materiales: pelo de murciélago y un trozo de carbón
    alcance: toque
    objetivo: objeto tocado
    efecto:
