    descripcion: |-
      Las criaturas u objetos afectados caen lentamente. Caída de pluma cambia instantáneamente la velocidad a la que los objetivos caen a unos meros 60 pies por asalto (equivalente al final de una caída desde pocos pies), y el objetivo no recibe daño al aterrizar mientras el conjuro esté en efecto. Cuando la duración del conjuro termina, vuelve a iniciarse una velocidad normal de caída.
      El conjuro afecta a una o más criaturas u objeto Medianos o más pequeños (incluyendo el equipo y objetos transportados hasta la carga máxima de cada criatura), o su equivalente en criaturas más grandes: una criatura u objeto Grande cuenta como dos Medianas, una criatura u objeto Enorme cuenta como cuatro criaturas u objetos Medianos, etc.
      Este conjuro no tiene efectos especiales sobre armas a distancia, a menos que hayan caído una cierta distancia. Si el conjuro se lanza sobre un objeto que está cayendo, ese objeto hace la mitad del daño basado en su peso, sin bonificador por la altura de la caída.
      Caída de pluma sólo funciona sobre objetos en caída libre. No afecta a un golpe de espada o a una criatura cargando o volando.
    fuente:
      libro: Reglamento básico
      pagina: 252
    verificacion:
      estado: verificado_pdf_local
  - nombre: Disco flotante
    alias_en_ingles: Floating Disk
    nivel: 1
    escuela: Evocación
    subescuela:
    descriptores:
    - fuerza
    tiempo_de_lanzamiento: 1 acción estándar
