    resistencia_a_conjuros: 'no'
    descripcion: |-
      Un conjuro de grasa cubre una superficie sólida con una capa de grasa resbaladiza. Cualquier criatura en el área en el momento de lanzar el conjuro debe superar una salvación de Reflejos o caer. Una criatura puede caminar dentro o a través de la zona engrasada a la mitad de la velocidad normal con una prueba de Acrobacias (CD 10). Un fallo indica que no puede moverse ese asalto (y debe hacer otra salvación de Reflejos o caer), mientras que un fallo por 5 o más significa que se cae (ver la habilidad de Acrobacias para más detalles). Las criaturas que no se mueven en su turno no necesitan hacer esta prueba y no se les considera desprevenidas.
      El conjuro también puede usarse para crear un baño de grasa sobre un objeto. Los objetos materiales que no estén en uso siempre se ven afectados por este conjuro, mientras que un objeto portado o empleado por una criatura requiere que su portador haga una salvación de Reflejos para evitar el efecto. Si la tirada de salvación inicial falla, la criatura deja caer inmediatamente el objeto. Cada asalto que la criatura trate de agarrar o usar el objeto engrasado, debe superar una nueva salvación. Una criatura que lleve una armadura o ropa engrasada obtiene un bonificador +10 de circunstancia a las pruebas de Escapismo, a sus tiradas de maniobras de combate para escapar de una presa y a su DMC para evitar ser apresado.
    fuente:
      libro: Reglamento básico
      pagina: 302
    verificacion:
      estado: verificado_pdf_local
  - nombre: Hipnotismo
    alias_en_ingles: Hypnotism
    nivel: 1
    escuela: Encantamiento
    subescuela: compulsión
    descriptores:
    - enajenador
    tiempo_de_lanzamiento: 1 round
    componentes:
      abreviatura: V, S
