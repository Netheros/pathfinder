    resistencia_a_conjuros: "; see text"
    descripcion: This spell wards a creature from attacks by evil creatures, from
      mental control, and from summoned creatures. It creates a magical barrier around
      the subject at a distance of 1 foot. The barrier moves with the subject and
      has three major effects. First, the subject gains a +2 deflection bonus to AC
      and a +2 resistance bonus on saves. Both these bonuses apply against attacks
      made or effects created by evil creatures. Second, the subject immediately receives
      another saving throw (if one was allowed to begin with) against any spells or
      effects that possess or exercise mental control over the creature (including
      enchantment [charm] effects and enchantment [compulsion] effects such as charm
      person, command, and dominate person). This saving throw is made with a +2 morale
      bonus, using the same DC as the original effect. If successful, such effects
      are suppressed for the duration of this spell. The effects resume when the duration
      of this spell expires. While under the effects of this spell, the target is
      immune to any new attempts to possess or exercise mental control over the target.
      This spell does not expel a controlling life force (such as a ghost or spellcaster
      using magic jar), but it does prevent them from controlling the target. This
      second effect only functions against spells and effects created by evil creatures
      or objects, subject to GM discretion. Third, the spell prevents bodily contact
      by evil summoned creatures. This causes the natural weapon attacks of such creatures
      to fail and the creatures to recoil if such attacks require touching the warded
      creature. Summoned creatures that are not evil are immune to this effect. The
      protection against contact by summoned creatures ends if the warded creature
      makes an attack against or tries to force the barrier against the blocked creature.
      Spell resistance can allow a creature to overcome this protection and touch
      the warded creature.
