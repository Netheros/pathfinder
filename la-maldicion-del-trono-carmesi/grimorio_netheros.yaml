  - nombre: Magic Circle against Evil
    alias_en_ingles: Magic Circle against Evil
    nivel: 3
    escuela: Abjuración
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M/DF (a 3-ft.-diameter circle of powdered silver)
      materiales:
    alcance: touch
    objetivo:
    efecto:
    area: 10-ft.-radius emanation from touched creature
    duracion: 10 min./level
    cancelable: false
    tirada_de_salvacion: Will negates (harmless)
    resistencia_a_conjuros: "; see text"
    descripcion: All creatures within the area gain the effects of a protection from
      evil spell, and evil summoned creatures cannot enter the area either. Creatures
      in the area, or who later enter the area, receive only one attempt to suppress
      effects that are controlling them. If successful, such effects are suppressed
      as long as they remain in the area. Creatures that leave the area and come back
      are not protected. You must overcome a creature's spell resistance in order
      to keep it at bay (as in the third function of protection from evil), but the
      deflection and resistance bonuses and the protection from mental control apply
      regardless of enemies' spell resistance. This spell has an alternative version
      that you may choose when casting it. A magic circle against evil can be focused
      inward rather than outward. When focused inward, the spell binds a nongood called
      creature (such as those called by the lesser planar binding, planar binding,
      and greater planar binding spells) for a maximum of 24 hours per caster level,
      provided that you cast the spell that calls the creature within 1 round of casting
      the magic circle. The creature cannot cross the circle's boundaries. If a creature
      too large to fit into the spell's area is the subject of the spell, the spell
      acts as a normal protection from evil spell for that creature only. A magic
      circle leaves much to be desired as a trap. If the circle of powdered silver
      laid down in the process of spellcasting is broken, the effect immediately ends.
      The trapped creature can do nothing that disturbs the circle, directly or indirectly,
      but other creatures can. If the called creature has spell resistance, it can
      test the trap once a day. If you fail to overcome its spell resistance, the
      creature breaks free, destroying the circle. A creature capable of any form
      of dimensional travel (astral projection, blink, dimension door, etherealness,
      gate, plane shift, shadow walk, teleport, and similar abilities) can simply
      leave the circle through such means. You can prevent the creature's extradimensional
      escape by casting a dimensional anchor spell on it, but you must cast the spell
      before the creature acts. If you are successful, the anchor effect lasts as
      long as the magic circle does. The creature cannot reach across the magic circle,
      but its ranged attacks (ranged weapons, spells, magical abilities, and the like)
      can. The creature can attack any target it can reach with its ranged attacks
      except for the circle itself. You can add a special diagram (a two-dimensional
      bounded figure with no gaps along its circumference, augmented with various
      magical sigils) to make the magic circle more secure. Drawing the diagram by
      hand takes 10 minutes and requires a DC 20 Spellcraft check. You do not know
      the result of this check. If the check fails, the diagram is ineffective. You
      can take 10 when drawing the diagram if you are under no particular time pressure
      to complete the task. This task also takes 10 full minutes. If time is no factor
      at all, and you devote 3 hours and 20 minutes to the task, you can take 20.
      A successful diagram allows you to cast a dimensional anchor spell on the magic
      circle during the round before casting any summoning spell. The anchor holds
      any called creatures in the magic circle for 24 hours per caster level. A creature
      cannot use its spell resistance against a magic circle prepared with a diagram,
      and none of its abilities or attacks can cross the diagram. If the creature
      tries a Charisma check to break free of the trap (see the lesser planar binding
      spell), the DC increases by 5. The creature is immediately released if anything
      disturbs the diagram-even a straw laid across it. The creature itself cannot
      disturb the diagram either directly or indirectly, as noted above. This spell
      is not cumulative with protection from evil and vice versa.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
