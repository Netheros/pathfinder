    alcance: touch
    objetivo: creature touched
    efecto:
    area:
    duracion: 1 minute
    cancelable: false
    tirada_de_salvacion: Will negates (harmless)
    resistencia_a_conjuros: yes (harmless)
    descripcion: You imbue the subject with magical energy that protects it from harm,
      granting it a +1 resistance bonus on saves. Resistance can be made permanent
      with a permanency spell.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
