  - nombre: Telaraña
    alias_en_ingles: Web
    nivel: 2
    escuela: conjuración (creación); Nivel bruja 2, hechicero/mago 2, magus 2
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
