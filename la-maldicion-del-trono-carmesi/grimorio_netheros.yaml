    efecto:
    area:
    duracion: 1 asalto/nivel
    cancelable: false
    tirada_de_salvacion: Fortaleza niega (inofensivo)
    resistencia_a_conjuros: sí (inofensivo)
    descripcion: |-
      Las criaturas transmutadas se mueven y actúan más rápidamente de lo normal. Esta velocidad adicional tiene varios efectos.
      Al realizar una acción de ataque completo, una criatura acelerada puede llevar a cabo un ataque adicional con cualquier arma que porte. El ataque utiliza el bonificador de ataque base completo de la criatura, más cualquier modificador apropiado a la situación. Este efecto no es acumulativo con efectos similares, como el proporcionado por un arma veloz ni proporciona realmente una acción adicional, de modo que no puedes usarla para lanzar un segundo conjuro o realizar de otro modo una acción adicional en el asalto. Una criatura acelerada obtiene un bonificador +1 a las tiradas de ataque y un bonificador +1 de esquiva a la CA y salvaciones de Reflejos. Cualquier condición que haga que pierdas tu bonificador por Destreza a la CA (si lo posees) también te hace perder tus bonificadores de esquiva.
      Todos los modos de movimiento de la criatura acelerada (incluyendo movimiento terrestre, cabar, trepar, volar y nadar) aumenta en 30 pies, hasta un máximo del doble de la velocidad normal del sujeto usando esa forma de movimiento. Este incremento cuenta como un bonificador de mejora y afecta a la distancia de salto de la criatura de la forma normal para una velocidad incrementada.
      Varios efectos de acelerar no se apilan. Acelerar disipa y contrarresta ralentizar.
    fuente:
      libro: Reglamento básico
      pagina: 240
    verificacion:
      estado: verificado_pdf_local
