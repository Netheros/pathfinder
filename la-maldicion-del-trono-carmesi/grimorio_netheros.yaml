  - nombre: Scrying
    alias_en_ingles: Scrying
    nivel: 4
    escuela: Adivinación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 hour
    componentes:
      abreviatura: V, S, M/DF (a pool of water), F (a silver mirror worth 1,000 gp)
      materiales: '1'
    alcance: see text
    objetivo:
    efecto: magical sensor
    area:
    duracion: 1 min./level
    cancelable: false
    tirada_de_salvacion: Will negates
    resistencia_a_conjuros: sí
    descripcion: 'You can observe a creature at any distance. If the subject succeeds
      on a Will save, the spell fails. The difficulty of the save depends on how well
      your knowledge of the subject and what sort of physical connection (if any)
      you have to that creature. Furthermore, if the subject is on another plane,
      it gets a +5 bonus on its Will save. Will Save Knowledge M odifier None* +10
      Secondhand (you have heard of the subject) +5 Firsthand (you have met the subject)
      +0 Familiar (you know the subject well) -5 *You must have some sort of connection
      (see below) to a creature of which you have no knowledge. Will Save Connection
      M odifier Likeness or picture -2 Possession or garment -4 Body part, lock of
      hair, bit of nail, etc. -10 If the save fails, you can see and hear the subject
      and its surroundings (approximately 10 feet in all directions of the subject).
      If the subject moves, the sensor follows at a speed of up to 150 feet. As with
      all divination (scrying) spells, the sensor has your full visual acuity, including
      any magical effects. In addition, the following spells have a 5% chance per
      caster level of operating through the sensor: detect chaos, detect evil, detect
      good, detect law, detect magic, and message. If the save succeeds, you can''t
      attempt to scry on that subject again for at least 24 hours.'
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
