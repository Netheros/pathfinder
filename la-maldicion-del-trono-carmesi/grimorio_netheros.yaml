      El rayo relampagueante prende fuego a los combustibles y daña objetos en su camino. Puede derretir metales con un bajo punto de fusión, como plomo, oro, cobre, plata o bronce. Si el daño causado a una barrera interpuesta la destruye o la atraviesa, el rayo puede continuar más allá de la barrera si el alcance del conjuro lo permite; si no, se detiene en la barrera como hace cualquier otro efecto de conjuro.
