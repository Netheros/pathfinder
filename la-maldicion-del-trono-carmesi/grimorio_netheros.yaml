    descripcion: |-
      Protección contra la energía otorga inmunidad temporal a un tipo de energía que especificas cuando lo lanzas (ácido, frío, electricidad, fuego o sonido). Cuando el conjuro absorbe 12 puntos por nivel de lanzador de daños de energía (hasta un máximo de 120 puntos a nivel 10), se descarga.
      Protección contra la energía se solapa (y no se apila con) resistir energía. Si un personaje está protegido con protección contra la energía y resistir energía , el conjuro de protección absorbe daño hasta que su poder se agota.
    fuente:
      libro: Reglamento básico
      pagina: 338
    verificacion:
      estado: verificado_pdf_local
  - nombre: Sondear pensamientos
    alias_en_ingles: Seek Thoughts
    nivel: 3
    escuela: Adivinación
    subescuela:
    descriptores:
    - enajenador
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M
      materiales: un puñado de monedas de cobre
    alcance: 40 pies
    objetivo:
    efecto:
    area: emanación de 40 pies centrada en ti
    duracion: concentración, hasta 1 minuto/nivel
    cancelable: false
    tirada_de_salvacion: Voluntad niega
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Similar a detectar pensamientos, sondear pensamientos te permite filtrar a través de los pensamientos superficiales de aquellos que te rodean. Puedes escanear en busca de la respuesta a una pregunta sencilla (como "¿Dónde está la guarida secreta de los hombres rata?") o en busca de información sobre un tema general (como las creencias de un culto maligno). Detectas el número de criaturas que están pensando sobre esta pregunta o tema dentro del alcance, así como su localización si son visibles para ti. Sondear pensamientos no te permite leer realmente pensamientos superficiales, sólo si una criatura concreta está pensando sobre el tema en el que te estás concentrando. Una salvación de Voluntad evita que detectes los pensamientos de una criatura mientras dure el conjuro.
      Puedes mantener la concentración en sondear pensamientos mientras mantienes una conversación normal, permitiéndote hacer preguntas sobre temas de interés. Una criatura que esté conversandocontigo mientras te concentras puede advertir que estás distraído con una prueba exitosa de Averiguar intenciones (CD 25).
    fuente:
      libro: Guía del jugador avanzada
      pagina:
    verificacion:
      estado: correlacionado_rolroyce
  - nombre: Encoger objeto
    alias_en_ingles: Shrink Item
    nivel: 3
    escuela: transmutación; Nivel hechicero/mago 3
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S
      materiales:
    alcance: toque
    objetivo: un objeto tocado de hasta 2 pies cúbicos/nivel
    efecto:
    area:
    duracion: 1 día/nivel; ver texto
    cancelable: false
    tirada_de_salvacion: Voluntad niega (objeto)
    resistencia_a_conjuros: sí (objeto)
    descripcion: |-
      Eres capaz de encoger un objeto no mágico (si está dentro del límite de tamaño) a 1/16 de su tamaño normal en cada dimensión (hasta 1/4.000 de su volumen y masa originales). Este cambio reduce el tamaño del objeto en cuatro categorías. De forma opcional, también puedes cambiar la composición del objeto reducido a una similar a la tela.
      Los objetos cambiados por un conjuro de encoger objeto pueden volver a su composición y tamaño normales simplemente lanzándolos sobre una superficie sólida o mediante una palabra de mando del lanzador original.
      Incluso un fuego ardiendo y su combustible pueden encogerse con este conjuro. Restaurar el objeto encogido a su tamaño y composición normales finaliza el conjuro.
      Encoger objeto puede hacerse permanente mediante un conjuro de permanencia, en cuyo caso el objeto afectado puede encogerse y expandirse un número indefinido de veces, pero sólo por parte del lanzador original.
    fuente:
      libro: Reglamento básico
      pagina: 286
    verificacion:
      estado: verificado_pdf_local
  - nombre: Tormenta de aguanieve
    alias_en_ingles: Sleet Storm
    nivel: 3
    escuela: Conjuración
    subescuela: creación
    descriptores:
    - frío
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
