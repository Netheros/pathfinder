      Obtienes algunas de las cualidades beneficiosas de un animal. Tu forma base
      apenas cambia y tu tamaño no se altera, pero algunas partes de tu cuerpo se
      transforman. La armadura o el equipo que lleves puesto se ajustan a tu nueva
      forma durante la duración del conjuro. Cuando lanzas aspecto animal, elige uno
      de los siguientes animales para obtener los beneficios asociados. Solo puedes
      tener activo sobre ti un conjuro de aspecto animal o de aspecto animal mayor
      al mismo tiempo. Rana: tus piernas se vuelven alargadas y musculosas. Obtienes
      un bonificador de competencia de +4 a las pruebas de Acrobacias y siempre saltas
      como si hubieras cogido carrerilla. Gorila: tus brazos se vuelven largos, flexibles
      y fuertes como los de un gran simio. El dado de daño de tus ataques sin armas
      aumenta un paso y obtienes un bonificador de competencia de +4 a las pruebas
      de maniobra de combate al realizar presa o recolocar. Mono: tus manos y brazos
      se vuelven ágiles como los de un simio. Obtienes un bonificador de competencia
      de +4 a las pruebas de Trepar y puedes lanzar objetos como si tuvieras la dote
      Throw Anything. Nutria: tus manos y pies desarrollan membranas y tus pulmones
      ganan capacidad, permitiéndote moverte por el agua con facilidad. Obtienes una
      velocidad de nado igual a la mitad de tu velocidad y todos los beneficios de
      tener una velocidad de nado. Además, puedes aguantar la respiración durante
      4 asaltos por punto de Constitución antes de verte obligado a hacer pruebas
      de Constitución para seguir conteniendo la respiración. Mapache: tus manos se
      vuelven extremadamente ágiles y tus pies se almohadillan. Obtienes un bonificador
      de competencia de +2 a las pruebas de Inutilizar mecanismo, Juego de manos y
      Sigilo. Raptor: tus piernas se vuelven aptas para correr a gran velocidad, como
      las de un deinonychus. Obtienes un bonificador de mejora de +20 pies a tu velocidad
      base. Lagarto arborícola: tus manos y pies desarrollan garras y almohadillas
      trepadoras. Obtienes una velocidad de trepar igual a la mitad de tu velocidad
      normal y todos los beneficios de tener una velocidad natural de trepar.
