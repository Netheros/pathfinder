  - nombre: Círculo mágico contra el mal
    alias_en_ingles: Magic Circle against Evil
    nivel: 3
    escuela: Abjuración
    subescuela:
    descriptores:
    - bueno
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M/FD
      materiales: un círculo de 3 pies (90 cm) de diámetro, trazado con polvo de plata
    alcance: toque
    objetivo:
    efecto:
    area: emanación de 10 pies (3 m) de radio desde la criatura tocada
    duracion: 10 minutos/nivel
    cancelable: false
    tirada_de_salvacion: Voluntad niega (inofensivo)
    resistencia_a_conjuros: no; ver texto
    descripcion: Todas las criaturas dentro del área obtienen los efectos de un conjuro
      de protección contra el mal, y ninguna criatura convocada maligna puede entrar
      en esta zona. Las criaturas que están en la zona, o que entran en ella más tarde,
      sólo tienen un intento de suprimir los efectos que las controlan. Si tienen
      éxito, dichos efectos se suprimen mientras se hallan en la zona. Las criaturas
      que salen de la zona y vuelven a ella no están protegidas. Debes superar la
      resistencia a conjuros de una criatura para poder mantenerla a raya, como en
      la tercera función de protección contra el mal, aunque los bonificadores por
      resistencia y desvío, y la protección frente al control mental se siguen aplicando
      independientemente de la resistencia a conjuros del objetivo. Este conjuro tiene
      una versión alternativa que puedes elegir en el momento del lanzamiento. Un
      círculo mágico puede lanzarse hacia dentro en lugar de hacia fuera. En este
      caso, el conjuro aprisiona a una criatura convocada de alineamiento no bueno,
      como las llamadas por los conjuros ligadura de los Planos menor, ligadura de
      los Planos y ligadura de los Planos mayor, durante un máximo de 24 horas por
      nivel de lanzador, suponiendo que seas tú quien lanza el conjuro que llama a
      la criatura en el asalto siguiente al lanzamiento del círculo mágico. La criatura
      no puede cruzar los límites del círculo. Si ésta es demasiado grande para caber
      dentro del área del conjuro, el conjuro funciona como uno de protección contra
      el mal normal, pero sólo para esa criatura. Un círculo mágico deja mucho que
      desear como trampa. Si el círculo de polvo de plata que se crea durante el lanzamiento
      se rompe, el efecto acaba inmediatamente. La criatura atrapada no puede hacer
      nada que afecte al círculo, directa o indirectamente, pero otras criaturas sí.
      Si la criatura convocada tiene resistencia a conjuros, puede poner a prueba
      la trampa una vez al día. Si fallas en superar su resistencia a conjuros, la
      criatura queda libre, destruyendo el círculo. Una criatura capaz de cualquier
      forma de viaje dimensional, como caminar por la sombra, desplazamiento de plano,
      etereidad, intermitencia, proyección astral, puerta dimensional, teletransportar,
      umbral y aptitudes similares, puede simplemente abandonar el círculo mediante
      cualquiera de estos medios. Puedes evitar la huída extradimensional de la criatura
      lanzando un conjuro de ancla dimensional, pero debes hacerlo antes de que la
      criatura actúe. Si tienes éxito, el efecto del ancla dura tanto como el círculo
      mágico. La criatura no puede alcanzarte a través del círculo mágico, pero sus
      ataques a distancia, como armas a distancia, conjuros o aptitudes mágicas, sí
      pueden. La criatura puede atacar a cualquier objetivo que esté dentro del alcance
      de sus ataques a distancia, excepto al círculo en sí. Puedes añadir un diagrama
      especial, una figura sin huecos que encierra la circunferencia y se aumenta
      con varios símbolos mágicos, al círculo mágico para hacerlo más seguro. Dibujar
      el diagrama a mano requiere 10 minutos y una prueba de Conocimiento de conjuros
      CD 20 cuyo resultado no conoces. Si falla, el diagrama no tiene efecto. Si no
      tienes una prisa especial en completar la tarea, puedes elegir 10 cuando dibujas
      el diagrama. Hacerlo así te sigue costando 10 minutos. Si el tiempo no importa
      en absoluto, puedes dedicar 3 horas y 20 minutos a la tarea y elegir 20. Un
      diagrama realizado con éxito te permite lanzar un conjuro de ancla dimensional
      en el círculo mágico durante el asalto anterior al lanzamiento de cualquier
      conjuro de convocación. El ancla inmoviliza a cualesquiera criaturas llamadas
      durante 24 horas por nivel de lanzador. Una criatura no puede utilizar su resistencia
      a conjuros contra un círculo mágico preparado con un diagrama, y ninguna de
      sus aptitudes o ataques pueden cruzarlo. Si la criatura intenta una prueba de
      Carisma para liberarse de la trampa, consulta el conjuro ligadura de los Planos
      menor, y la CD aumenta en 5. La criatura es liberada inmediatamente si algo
      altera el diagrama, incluso una brizna de paja que caiga sobre él. No obstante,
      la propia criatura no puede alterarlo directa ni indirectamente, como se ha
      señalado antes. Este conjuro no puede acumularse con protección contra el mal,
      ni viceversa.
    fuente:
      libro: Reglamento básico
      pagina: 258
    verificacion:
      estado: verificado_pdf_local
