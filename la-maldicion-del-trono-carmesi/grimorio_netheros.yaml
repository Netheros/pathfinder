  - nombre: Seek Thoughts
    alias_en_ingles: Seek Thoughts
    nivel: 3
    escuela: Adivinación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M (a handful of copper coins)
      materiales:
    alcance: 40 ft.
    objetivo:
    efecto:
    area: 40-ft.-radius emanation centered on you
    duracion: concentration, up to 1 minute/level
    cancelable: false
    tirada_de_salvacion: Will negates
    resistencia_a_conjuros:
    descripcion: Similar to detect thoughts, seek thoughts allows you to sift through
      the surface thoughts of those around you. You may scan for either the answer
      to a simple question (such as "Where is the hidden lair of the wererats?") or
      for information on a general topic (such as the beliefs of an evil cult). You
      detect the number of creatures who are thinking about this question or topic
      within range, as well as their location if they are visible to you. Seek thoughts
      does not let you read actual surface thoughts, only if a given creature is thinking
      about the topic you are concentrating on. A successful Will save prevents you
      from sensing a creature's thoughts for the duration of the spell. You can maintain
      concentration on seek thoughts while you engage in normal conversation, allowing
      you to ask leading questions about topics of interest. A creature conversing
      with you while you concentrate can notice that you are distracted with a successful
      DC 25 Sense Motive check.
    fuente:
      libro: Guía del jugador avanzada
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Shrink Item
    alias_en_ingles: Shrink Item
    nivel: 3
    escuela: Transmutación
