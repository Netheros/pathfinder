  - nombre: Wall Of Ice
    alias_en_ingles: Wall Of Ice
    nivel: 4
    escuela: Evocación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M (a piece of quartz or rock crystal)
      materiales:
    alcance: medium (100 ft. + 10 ft./level)
    objetivo:
    efecto: anchored plane of ice, up to one 10-ft. square/level, or hemisphere of
      ice with a radius of up to 3 ft. + 1 ft./level
    area:
    duracion: 1 min./level
    cancelable: false
    tirada_de_salvacion: Reflex negates; see text
    resistencia_a_conjuros: sí
    descripcion: 'This spell creates an anchored plane of ice or a hemisphere of ice,
      depending on the version selected. A wall of ice cannot form in an area occupied
      by physical objects or creatures. Its surface must be smooth and unbroken when
      created. Any creature adjacent to the wall when it is created may attempt a
      Reflex save to disrupt the wall as it is being formed. A successful save indicates
      that the spell automatically fails. Fire can melt a wall of ice, and it deals
      full damage to the wall (instead of the normal half damage taken by objects).
      Suddenly melting a wall of ice creates a great cloud of steamy fog that lasts
      for 10 minutes. Ice Plane: A sheet of strong, hard ice appears. The wall is
      1 inch thick per caster level. It covers up to a 10-foot-square area per caster
      level (so a 10th-level wizard can create a wall of ice 100 feet long and 10
      feet high, a wall 50 feet long and 20 feet high, or any other combination of
      length and height that does not exceed 1,000 square feet). The plane can be
      oriented in any fashion as long as it is anchored. A vertical wall need only
      be anchored on the floor, while a horizontal or slanting wall must be anchored
      on two opposite sides. Each 10-foot square of wall has 3 hit points per inch
      of thickness. Creatures can hit the wall automatically. A section of wall whose
      hit points drop to 0 is breached. If a creature tries to break through the wall
      with a single attack, the DC for the Strength check is 15 + caster level. Even
      when the ice has been broken through, a sheet of frigid air remains. Any creature
      stepping through it (including the one who broke through the wall) takes 1d6
      points of cold damage + 1 point per caster level (no save). Hemisphere: The
      wall takes the form of a hemisphere whose maximum radius is 3 feet + 1 foot
      per caster level. The hemisphere is as hard to break through as the ice plane
      form, but it does not deal damage to those who go through a breach.'
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Cloudkill
    alias_en_ingles: Cloudkill
    nivel: 5
    escuela: Conjuración
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S
      materiales:
    alcance: medium (100 ft. + 10 ft./level)
    objetivo:
    efecto: cloud spreads in 20-ft. radius, 20 ft. high
    area:
    duracion: 1 min./level
    cancelable: false
    tirada_de_salvacion: Fortitude partial; see text
    resistencia_a_conjuros:
    descripcion: This spell generates a bank of fog, similar to a fog cloud, except
      that its vapors are yellowish green and poisonous. These vapors automatically
      kill any living creature with 3 or fewer HD (no save). A living creature with
      4 to 6 HD is slain unless it succeeds on a Fortitude save (in which case it
      takes 1d4 points of Constitution damage on your turn each round while in the
      cloud). A living creature with more than 6 HD takes 1d4 points of Constitution
      damage on your turn each round while in the cloud (a successful Fortitude save
      halves this damage). Holding one's breath doesn't help, but creatures immune
      to poison are unaffected by the spell. Unlike a fog cloud, the cloudkill moves
      away from you at 10 feet per round, rolling along the surface of the ground.
      Figure out the cloud's new spread each round based on its new point of origin,
      which is 10 feet farther away from the point of origin where you cast the spell.
      Because the vapors are heavier than air, they sink to the lowest level of the
      land, even pouring down den or sinkhole openings. It cannot penetrate liquids,
      nor can it be cast underwater.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Magic Jar
    alias_en_ingles: Magic Jar
    nivel: 5
    escuela: Nigromancia
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, F (a gem or crystal worth at least 100 gp)
      materiales: '1'
    alcance: medium (100 ft. + 10 ft./level)
    objetivo: one creature
    efecto:
    area:
    duracion: 1 hour/level or until you return to your body
    cancelable: false
    tirada_de_salvacion: Will negates; see text
    resistencia_a_conjuros: sí
    descripcion: By casting magic jar, you place your soul in a gem or large crystal
      (known as the magic jar), leaving your body lifeless. Then you can attempt to
      take control of a nearby body, forcing its soul into the magic jar. You may
      move back to the jar (thereby returning the trapped soul to its body) and attempt
      to possess another body. The spell ends when you send your soul back to your
      own body, leaving the receptacle empty. To cast the spell, the magic jar must
      be within spell range and you must know where it is, though you do not need
      line of sight or line of effect to it. When you transfer your soul upon casting,
      your body is, as near as anyone can tell, dead. While in the magic jar, you
      can sense and attack any life force within 10 feet per caster level (and on
      the same plane of existence). You do need line of effect from the jar to the
      creatures. You cannot determine the exact creature types or positions of these
      creatures. In a group of life forces, you can sense a difference of 4 or more
      HD between one creature and another and can determine whether a life force is
      powered by positive or negative energy. (Undead creatures are powered by negative
      energy. Only sentient undead creatures have, or are, souls.) You could choose
      to take over either a stronger or a weaker creature, but which particular stronger
      or weaker creature you attempt to possess is determined randomly. Attempting
      to possess a body is a full-round action. It is blocked by protection from evil
      or a similar ward. You possess the body and force the creature's soul into the
      magic jar unless the subject succeeds on a Will save. Failure to take over the
      host leaves your life force in the magic jar, and the target automatically succeeds
      on further saving throws if you attempt to possess its body again. If you are
      successful, your life force occupies the host body, and the host's life force
      is imprisoned in the magic jar. You keep your Intelligence, Wisdom, Charisma,
      level, class, base attack bonus, base save bonuses, alignment, and mental abilities.
      The body retains its Strength, Dexterity, Constitution, hit points, natural
      abilities, and automatic abilities. A body with extra limbs does not allow you
      to make more attacks (or more advantageous two-weapon attacks) than normal.
      You can't choose to activate the body's extraordinary or supernatural abilities.
      The creature's spells and spell-like abilities do not stay with the body. As
      a standard action, you can shift freely from a host to the magic jar if within
      range, sending the trapped soul back to its body. The spell ends when you shift
      from the jar to your own body. If the host body is slain, you return to the
      magic jar, if within range, and the life force of the host departs (it is dead).
      If the host body is slain beyond the range of the spell, both you and the host
      die. Any life force with nowhere to go is treated as slain. If the spell ends
      while you are in the magic jar, you return to your body (or die if your body
      is out of range or destroyed). If the spell ends while you are in a host, you
      return to your body (or die, if it is out of range of your current position),
      and the soul in the magic jar returns to its body (or dies if it is out of range).
      Destroying the receptacle ends the spell, and the spell can be dispelled at
      either the magic jar or the host's location.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Teleport
    alias_en_ingles: Teleport
    nivel: 5
    escuela: Conjuración
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V
      materiales:
    alcance: personal and touch
    objetivo: you and touched objects or other touched willing creatures
    efecto:
    area:
    duracion: instantaneous
    cancelable: false
    tirada_de_salvacion: none and Will negates (object)
    resistencia_a_conjuros: and yes (object)
    descripcion: 'This spell instantly transports you to a designated destination,
      which may be as distant as 100 miles per caster level. Interplanar travel is
      not possible. You can bring along objects as long as their weight doesn''t exceed
      your maximum load. You may also bring one additional willing Medium or smaller
      creature (carrying gear or objects up to its maximum load) or its equivalent
      per three caster levels. A Large creature counts as two Medium creatures, a
      Huge creature counts as four Medium creatures, and so forth. All creatures to
      be transported must be in contact with one another, and at least one of those
      creatures must be in contact with you. As with all spells where the range is
      personal and the target is you, you need not make a saving throw, nor is spell
      resistance applicable to you. Only objects held or in use (attended) by another
      person receive saving throws and spell resistance. You must have some clear
      idea of the location and layout of the destination. The clearer your mental
      image, the more likely the teleportation works. Areas of strong physical or
      magical energy may make teleportation more hazardous or even impossible. To
      see how well the teleportation works, roll d% and consult the table at the end
      of this spell. Refer to the following information for definitions of the terms
      on the table. Familiarity: "Very familiar" is a place where you have been very
      often and where you feel at home. "Studied carefully" is a place you know well,
      either because you can currently physically see it or you''ve been there often.
      "Seen casually" is a place that you have seen more than once but with which
      you are not very familiar. "Viewed once" is a place that you have seen once,
      possibly using magic such as scrying. "False destination" is a place that does
      not truly exist or if you are teleporting to an otherwise familiar location
      that no longer exists as such or has been so completely altered as to no longer
      be familiar to you. When traveling to a false destination, roll 1d20+80 to obtain
      results on the table, rather than rolling d%, since there is no real destination
      for you to hope to arrive at or even be off target from. On Target: You appear
      where you want to be. Off Target: You appear safely a random distance away from
      the destination in a random direction. Distance off target is d% of the distance
      that was to be traveled. The direction off target is determined randomly. Similar
      Area: You wind up in an area that''s visually or thematically similar to the
      target area. Generally, you appear in the closest similar place within range.
      If no such area exists within the spell''s range, the spell simply fails instead.
      Mishap: You and anyone else teleporting with you have gotten "scrambled." You
      each take 1d10 points of damage, and you reroll on the chart to see where you
      wind up. For these rerolls, roll 1d20+80. Each time "Mishap" comes up, the characters
      take more damage and must reroll. O n O ff Similar Familiarity Target Target
      Area M ishap Very familiar 01-97 98-99 100 - Studied carefully 01-94 95-97 98-99
      100 Seen casually 01-88 89-94 95-98 99-100 Viewed once 01-76 77-88 89-96 97-100
      False destination - - 81-92 93-100'
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
