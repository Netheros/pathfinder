    descripcion: |-
      Cuando este conjuro se lanza sobre un trozo de cuerda de entre 5 y 30 pies de largo, un extremo de la cuerda se eleva hacia el aire hasta que toda la cuerda queda perpendicular al suelo, como si estuviera sujeta en el extremo superior.
      El extremo superior está, de hecho, conectado a un espacio dimensional que está fuera del multiverso habitual de espacios extradimensionales. Las criaturas en el espacio extradimensional están ocultas, más allá del alcance de conjuros (incluyendo adivinaciones), a menos que esos conjuros puedan cruzar funcionar a través de planos. El espacio contiene hasta ocho criaturas (de cualquier tamaño). La cuerda no puede retirarse ni ocultarse. La cuerda puede soportar hasta 16.000 libras. Un peso mayor que ese puede soltar la cuerda.
      Los conjuros no pueden atravesar la ventana extradimensional, ni tampoco las áreas de efecto. Aquellos en el espacio extradimensional pueden ver hacia fuera como si hubiera una ventana de 3x5 pies centrada en la cuerda.
