    alcance: unlimited
    objetivo:
    efecto: magical sensor
    area:
    duracion: 1 min./level
    cancelable: true
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: You create an invisible magical sensor that sends you visual information.
      You can create the arcane eye at any point you can see, but it can then travel
      outside your line of sight without hindrance. An arcane eye travels at 30 feet
      per round (300 feet per minute) if viewing an area ahead as a human would (primarily
      looking at the floor) or 10 feet per round (100 feet per minute) if examining
      the ceiling and walls as well as the floor ahead. It sees exactly as you would
      see if you were there. The eye can travel in any direction as long as the spell
      lasts. Solid barriers block its passage, but it can pass through a hole or space
      as small as 1 inch in diameter. The eye can't enter another plane of existence,
      even through a gate or similar magical portal. You must concentrate to use an
      arcane eye. If you do not concentrate, the eye is inert until you again concentrate.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Black Tentacles
    alias_en_ingles: Black Tentacles
    nivel: 4
    escuela: Conjuración
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M (octopus or squid tentacle)
      materiales:
    alcance: medium (100 ft. + 10 ft./level)
    objetivo:
    efecto:
    area: 20-ft.-radius spread
    duracion: 1 round/level (D)
    cancelable: true
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: This spell causes a field of rubbery black tentacles to appear, burrowing
      up from the floor and reaching for any creature in the area. Every creature
      within the area of the spell is the target of a combat maneuver check made to
      grapple each round at the beginning of your turn, including the round that black
      tentacles is cast. Creatures that enter the area of effect are also automatically
      attacked. The tentacles do not provoke attacks of opportunity. When determining
      the tentacles' CMB, the tentacles use your caster level as their base attack
      bonus and receive a +4 bonus due to their Strength and a +1 size bonus. Roll
      only once for the entire spell effect each round and apply the result to all
      creatures in the area of effect. If the tentacles succeed in grappling a foe,
      that foe takes 1d6+4 points of damage and gains the grappled condition. Grappled
      opponents cannot move without first breaking the grapple. All other movement
      is prohibited unless the creature breaks the grapple first. The black tentacles
      spell receives a +5 bonus on grapple checks made against opponents it is already
      grappling, but cannot move foes or pin foes. Each round that black tentacles
      succeeds on a grapple check, it deals an additional 1d6+4 points of damage.
      The CMD of black tentacles, for the purposes of escaping the grapple, is equal
      to 10 + its CMB. The tentacles created by this spell cannot be damaged, but
      they can be dispelled as normal. The entire area of effect is considered difficult
      terrain while the tentacles last.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
