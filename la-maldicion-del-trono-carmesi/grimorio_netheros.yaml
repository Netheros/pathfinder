    alcance: close (25 ft. + 5 ft./2 levels)
    objetivo: one humanoid creature of 4 HD or less
    efecto:
    area:
    duracion: 1 round
    cancelable: false
    tirada_de_salvacion: Will negates
    resistencia_a_conjuros: sí
    descripcion: This spell clouds the mind of a humanoid creature with 4 or fewer
      Hit Dice so that it takes no actions. Humanoids of 5 or more HD are not affected.
      A dazed subject is not stunned, so attackers get no special advantage against
      it. After a creature has been dazed by this spell, it is immune to the effects
      of this spell for 1 minute.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Detect Magic
    alias_en_ingles: Detect Magic
    nivel: 0
    escuela: Adivinación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S
      materiales:
    alcance: 60 ft.
    objetivo:
    efecto:
    area: cone-shaped emanation
    duracion: concentration, up to 1 min./level
    cancelable: true
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: 'You detect magical auras. The amount of information revealed depends
      on how long you study a particular area or subject. 1st Round: Presence or absence
      of magical auras. 2nd Round: Number of different magical auras and the power
      of the most potent aura. 3rd Round: The strength and location of each aura.
      If the items or creatures bearing the auras are in line of sight, you can make
      Knowledge (arcana) skill checks to determine the school of magic involved in
      each. (Make one check per aura: DC 15 + spell level, or 15 + 1/2 caster level
      for a nonspell effect.) If the aura emanates from a magic item, you can attempt
      to identify its properties (see Spellcraft). Magical areas, multiple types of
      magic, or strong local magical emanations may distort or conceal weaker auras.
      Aura Strength: An aura''s power depends on a spell''s functioning spell level
      or an item''s caster level; see the accompanying table. If an aura falls into
      more than one category, detect magic indicates the stronger of the two. Spell
      or Object Aura Power Faint Moderate Strong Overwhelming Functioning spell (spell
      level) 3rd or lower 4th-6th 7th-9th 10th+ (deity-level) Magic item (caster level)
      5th or lower 6th-11th 12th-20th 21st+ (artifact) Lingering Aura: A magical aura
      lingers after its original source dissipates (in the case of a spell) or is
      destroyed (in the case of a magic item). If detect magic is cast and directed
      at such a location, the spell indicates an aura strength of dim (even weaker
      than a faint aura). How long the aura lingers at this dim level depends on its
      original power: Original Strength Duration of Lingering Aura Faint 1d6 rounds
      Moderate 1d6 minutes Strong 1d6x10 minutes Overwhelming 1d6 days Outsiders and
      elementals are not magical in themselves, but if they are summoned, the conjuration
      spell registers. Each round, you can turn to detect magic in a new area. The
      spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a
      thin sheet of lead, or 3 feet of wood or dirt blocks it. Detect magic can be
      made permanent with a permanency spell.'
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Detect Poison
    alias_en_ingles: Detect Poison
    nivel: 0
    escuela: Adivinación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
