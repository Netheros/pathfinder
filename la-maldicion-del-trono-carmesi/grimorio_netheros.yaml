    duracion: 1 min./nivel (D)
    cancelable: true
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Este conjuro hace que un objeto irradie oscuridad hasta un radio de 20 pies. Esta oscuridad hace que el nivel de iluminación de un área descienda en un paso, de luz brillante a luz normal, de luz normal a luz tenue y de luz tenue a oscuridad. Este conjuro no tiene efecto sobre un área que ya está oscura. Las criaturas con vulnerabilidad o sensibilidad a la luz no reciben penalizadores en zonas de luz normal. Todas las criaturas obtienen ocultación (20% de probabilidades de fallo) en luz tenue. Todas las criaturas obtienen ocultación total (50% de probabilidades de fallo) en la oscuridad.
      Las criaturas con visión en la oscuridad pueden ver en un área de luz tenue o de oscuridad sin penalizador. Las fuentes de luz no mágicas, como antorchas y linternas no aumentan el nivel de iluminación en un área de oscuridad. Las fuentes de luz mágica sólo aumentan el nivel de iluminazión en el área si pertenecen a un conjuro de nivel superior al de oscuridad.
      Si oscuridad se lanza sobre un objeto pequeño que después se coloca bajo una cobertura a prueba de luz, el efecto del conjuro queda bloqueado hasta que la cobertura se retire.
      Este conjuro no se apila consigo mismo. Oscuridad puede usarse para contrarreatar o disipar cualquier conjuro de luz del mismo nivel o inferior.
    fuente:
      libro: Reglamento básico
      pagina: 329
    verificacion:
      estado: verificado_pdf_local
