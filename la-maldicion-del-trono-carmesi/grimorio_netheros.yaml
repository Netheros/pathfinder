    descripcion: |-
      Un banco de niebla se extiende desde el punto que designes. La niebla oscurece la visión, incluyendo la visión en la oscuridad, más allá de 5 pies. Una criatura que esté a 5 pies o menos posee ocultación (los ataques tienen un 20% de probabilidad de fallo).
      Las criaturas a más distancia poseen ocultación total (50% de probabilidad de fallo y el atacante no puede usar la vista para localizar al objetivo).
      Un viento moderado (11 millas por hora o más) dispersa la niebla en 4 asaltos; un viento fuerte (21 millas por hora o más) disipa la niebla en 1 asalto.
      Este conjuro no funciona bajo el agua.
    fuente:
      libro: Reglamento básico
