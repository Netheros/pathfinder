    duracion: 1 asalto/nivel
    cancelable: false
    tirada_de_salvacion: ninguno
    resistencia_a_conjuros: 'no'
    descripcion: |-
      La cellisca bloquea toda la visión (incluida la visión en la oscuridad) en su interior y hace que el suelo del área quede helado. Una criatura puede caminar por dentro o atravesar el área de la tormenta a la mitad de su velocidad normal con una prueba de Acrobacias (CD 10). El fallo indica que no se puede mover en ese asalto, mientras que fallar por 5 o más significa que cae (ver la habilidad de Acrobacias para más detalles).
      La tormenta extingue antorchas y fuegos pequeños.
    fuente:
      libro: Reglamento básico
      pagina: 364
    verificacion:
      estado: verificado_pdf_local
  - nombre: Lentificar
    alias_en_ingles: Slow
    nivel: 3
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M
      materiales: una gota de melaza
    alcance: corto (25 pies + 5 pies/2 niveles)
    objetivo: una criatura/nivel, ninguna de las cuales puede estar a más de 30 pies
      de las demás
    efecto:
    area:
    duracion: 1 asalto/nivel
    cancelable: false
    tirada_de_salvacion: Voluntad niega
    resistencia_a_conjuros: sí
    descripcion: |-
      Una criatura afectada se mueve y ataca a una velocidad drásticamente reducida. Las criaturas afectadas por este conjuro están groguis y sólo pueden realizar una única acción de movimiento o una acción estándar cada turno, pero no ambas (ni tampoco realizar acciones de asalto completo). Además, recibe un penalizador -1 a las tiradas de ataque, CA y salvaciones de Reflejos. Una criatura ralentizada se mueve a la mitad de su velocidad normal (redondeando hasta el siguiente incremento de 5 pies), lo que afecta a la distancia de salto de la criatura de la forma normal para velocidad reducida.
      Varios efectos de ralentizar no se apilan. Ralentizar contrarresta y disipa acelerar.
    fuente:
      libro: Reglamento básico
      pagina: 312
    verificacion:
      estado: verificado_pdf_local
  - nombre: Nube apestosa
    alias_en_ingles: Stinking Cloud
    nivel: 3
    escuela: Conjuración
    subescuela: creación
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M
      materiales: un huevo podrido u hojas de repollo
    alcance: intermedio (100 pies + 10 pies/nivel)
    objetivo:
    efecto: nube que se extiende 20 pies de radio y 20 pies de altura
    area:
    duracion: 1 asalto/nivel
    cancelable: false
    tirada_de_salvacion: Fortaleza niega; ver texto
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Nube apestosa crea un banco de niebla como el creado por nube brumosa, excepto en que los vapores son nauseantes. Las criaturas vivas dentro de la nube quedan mareadas
      Esta condición dura mientras la criatura permanezca dentro de la nube y 1d4+1 asaltos después de que la abandone (tira por separado para cada personaje mareado). Cualquier criatura que tenga éxito en su salvación pero permanezca en la nube debe continuar tirando salvaciones cada asalto durante su turno.
      Nube apestosa puede hacerse permanente con un conjuro de permanencia. Una nube apestosa permanente dispersada por el viento se reforma en 10 minutos.
    fuente:
      libro: Reglamento básico
      pagina: 327
