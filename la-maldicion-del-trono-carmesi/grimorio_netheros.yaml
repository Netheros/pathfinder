  - nombre: Corcel fantasmal
    alias_en_ingles: Phantom Steed
    nivel: 3
    escuela: Conjuración
    subescuela: creación
    descriptores: []
    tiempo_de_lanzamiento: 10 minutos
    componentes:
      abreviatura: V, S
      materiales:
    alcance: 0 pies
    objetivo:
    efecto: una criatura équida cuasirreal
    area:
    duracion: 1 hora/nivel (D)
    cancelable: true
    tirada_de_salvacion:
    resistencia_a_conjuros: 'no'
    descripcion: |-
      Te permite conjurar a una criatura équida Grande (la coloración exacta puede personalizarse como desees), que sólo podrá ser montada por ti o por la persona para la que hayas creado específicamente la montura. Una montura fantasmal tiene negros el cuerpo y la cabeza, crines y cola grises y color humo las pezuñas, que son insustanciales y no hacen ruido alguno. Tiene lo que parece una silla, bocado y brida. No combate, pero los animales normalmente se apartarán de él y se negarán a atacarlo.
      La montura tiene una Clase de Armadura 18 (-1 de tamaño, +4 de armadura natural, +5 de Destreza) y 7 puntos de golpe +1 punto de golpe por nivel de lanzador. Si pierde todos sus puntos de golpe, el corcel fantasmal desaparece. Un corcel fantasmal tiene una velocidad de 20 pies por cada dos niveles de lanzador, hasta un máximo de 100 pies a 10º nivel. Puede transportar a su jinete y hasta 10 libras adicionales por nivel de lanzador. Estas monturas obtienen ciertos poderes según el nivel de lanzador. Las aptitudes de una montura incluyen aquellas de nivel de lanzador inferior.
      8º Nivel: la montura podrá cabalgar sobre terreno arenoso, embarrado e incluso pantanoso sin dificultad ni reducir su velocidad. 10º Nivel: la montura puede usar caminar sobre las aguas a voluntad (como el conjuro, no se requiere una acción para activar esta aptitud). 12º Nivel: la montura puede usar caminar por el aire a voluntad (como el conjuro, no se requiere una acción para activar esta aptitud) durante 1 asalto cada vez, después del cual cae hasta el suelo. 14º Nivel: la montura puede volar a su velocidad normal con un bonificador a la habilidad de Volar igual a tu nivel de lanzador.
    fuente:
      libro: Reglamento básico
      pagina: 269
    verificacion:
      estado: verificado_pdf_local
  - nombre: Protección contra la energía
    alias_en_ingles: Protection from Energy
    nivel: 3
    escuela: Abjuración
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, M/FD
