  - nombre: Arcane Eye
    alias_en_ingles: Arcane Eye
    nivel: 4
    escuela: Adivinación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 10 minutes
    componentes:
      abreviatura: V, S, M (a bit of bat fur)
