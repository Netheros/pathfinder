      You must succeed on a ranged touch attack with the ray to deal damage to a target.
      The ray deals 1d3 points of cold damage.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Read Magic
    alias_en_ingles: Read Magic
    nivel: 0
    escuela: Adivinación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, F (a clear crystal or mineral prism)
      materiales:
    alcance: personal
    objetivo: you
    efecto:
    area:
    duracion: 10 min./level
    cancelable: false
    tirada_de_salvacion:
    resistencia_a_conjuros:
    descripcion: You can decipher magical inscriptions on objects-books, scrolls,
      weapons, and the like-that would otherwise be unintelligible. This deciphering
      does not normally invoke the magic contained in the writing, although it may
      do so in the case of a cursed or trapped scroll. Furthermore, once the spell
      is cast and you have read the magical inscription, you are thereafter able to
      read that particular writing without recourse to the use of read magic. You
      can read at the rate of one page (250 words) per minute. The spell allows you
      to identify a glyph of warding with a DC 13 Spellcraft check, a greater glyph
      of warding with a DC 16 Spellcraft check, or any symbol spell with a Spellcraft
      check (DC 10 + spell level). Read magic can be made permanent with a permanency
      spell.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
