  - nombre: Ghost Sound
    alias_en_ingles: Ghost Sound
    nivel: 0
    escuela: Ilusión
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M (a bit of wool or a small lump of wax)
      materiales:
    alcance: close (25 ft. + 5 ft./2 levels)
    objetivo:
    efecto: illusory sounds
    area:
    duracion: 1 round/level
    cancelable: true
    tirada_de_salvacion: Will disbelief
    resistencia_a_conjuros:
    descripcion: Ghost sound allows you to create a volume of sound that rises, recedes,
      approaches, or remains at a fixed place. You choose what type of sound ghost
      sound creates when casting it and cannot thereafter change the sound's basic
      character. The volume of sound created depends on your level. You can produce
      as much noise as four normal humans per caster level (maximum 40 humans). Thus,
      talking, singing, shouting, walking, marching, or running sounds can be created.
      The noise a ghost sound spell produces can be virtually any type of sound within
      the volume limit. A horde of rats running and squeaking is about the same volume
      as eight humans running and shouting. A roaring lion is equal to the noise from
      16 humans, while a roaring dragon is equal to the noise from 32 humans. Anyone
      who hears a ghost sound receives a Will save to disbelieve. Ghost sound can
      enhance the effectiveness of a silent image spell. Ghost sound can be made permanent
      with a permanency spell.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Haunted Fey Aspect
    alias_en_ingles: Haunted Fey Aspect
    nivel: 0
    escuela: Ilusión
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: S
      materiales:
    alcance: Personal
    objetivo: You
    efecto:
    area:
