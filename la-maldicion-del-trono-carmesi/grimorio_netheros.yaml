  - nombre: Invisibility
    alias_en_ingles: Invisibility
    nivel: 2
    escuela: Ilusión
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M/DF (an eyelash encased in gum arabic)
      materiales:
    alcance: personal or touch
    objetivo: you or a creature or object weighing no more than 100 lbs./level
    efecto:
    area:
    duracion: 1 min./level (D)
    cancelable: true
    tirada_de_salvacion: Will negates (harmless) or Will negates (harmless, object)
    resistencia_a_conjuros: yes (harmless) or yes (harmless, object)
    descripcion: The creature or object touched becomes invisible. If the recipient
      is a creature carrying gear, that vanishes, too. If you cast the spell on someone
      else, neither you nor your allies can see the subject, unless you can normally
      see invisible things or you employ magic to do so. Items dropped or put down
      by an invisible creature become visible; items picked up disappear if tucked
      into the clothing or pouches worn by the creature. Light, however, never becomes
      invisible, although a source of light can become so (thus, the effect is that
      of a light with no visible source). Any part of an item that the subject carries
      but that extends more than 10 feet from it becomes visible. Of course, the subject
      is not magically silenced, and certain other conditions can render the recipient
      detectable (such as swimming in water or stepping in a puddle). If a check is
      required, a stationary invisible creature has a +40 bonus on its Stealth checks.
      This bonus is reduced to +20 if the creature is moving. The spell ends if the
      subject attacks any creature. For purposes of this spell, an attack includes
      any spell targeting a foe or whose area or effect includes a foe. Exactly who
      is a foe depends on the invisible character's perceptions. Actions directed
      at unattended objects do not break the spell. Causing harm indirectly is not
      an attack. Thus, an invisible being can open doors, talk, eat, climb stairs,
      summon monsters and have them attack, cut the ropes holding a rope bridge while
      enemies are on the bridge, remotely trigger traps, open a portcullis to release
      attack dogs, and so forth. If the subject attacks directly, however, it immediately
      becomes visible along with all its gear. Spells such as bless that specifically
      affect allies but not foes are not attacks for this purpose, even when they
      include foes in their area. Invisibility can be made permanent (on objects only)
      with a permanency spell.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Knock
    alias_en_ingles: Knock
    nivel: 2
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V
      materiales:
    alcance: medium (100 ft. + 10 ft./level)
    objetivo: one door, box, or chest with an area of up to 10 sq. ft./level
    efecto:
    area:
    duracion: instantaneous; see text
    cancelable: false
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: Knock opens stuck, barred, or locked doors, as well as those subject
      to hold portal or arcane lock. When you complete the casting of this spell,
      make a caster level check against the DC of the lock with a +10 bonus. If successful,
      knock opens up to two means of closure. This spell opens secret doors, as well
      as locked or trick-opening boxes or chests. It also loosens welds, shackles,
      or chains (provided they serve to hold something shut). If used to open an arcane
      locked door, the spell does not remove the arcane lock but simply suspends its
      functioning for 10 minutes. In all other cases, the door does not relock itself
      or become stuck again on its own. Knock does not raise barred gates or similar
      impediments (such as a portcullis), nor does it affect ropes, vines, and the
      like. The effect is limited by the area. Each casting can undo as many as two
      means of preventing access.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Levitate
    alias_en_ingles: Levitate
    nivel: 2
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, F (a leather loop or golden wire bent into a cup shape)
      materiales:
    alcance: personal or close (25 ft. + 5 ft./2 levels)
    objetivo: you or one willing creature or one object (total weight up to 100 lbs./level)
    efecto:
    area:
    duracion: 1 min./level
    cancelable: true
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: Levitate allows you to move yourself, another creature, or an object
      up and down as you wish. A creature must be willing to be levitated, and an
      object must be unattended or possessed by a willing creature. You can mentally
      direct the recipient to move up or down as much as 20 feet each round; doing
      so is a move action. You cannot move the recipient horizontally, but the recipient
      could clamber along the face of a cliff, for example, or push against a ceiling
      to move laterally (generally at half its base land speed). A levitating creature
      that attacks with a melee or ranged weapon finds itself increasingly unstable;
      the first attack has a -1 penalty on attack rolls, the second -2, and so on,
      to a maximum penalty of -5. A full round spent stabilizing allows the creature
      to begin again at -1.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Locate Object
    alias_en_ingles: Locate Object
    nivel: 2
    escuela: Adivinación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, F/DF (a forked twig)
      materiales:
    alcance: long (400 ft. + 40 ft./level)
    objetivo:
    efecto:
    area: circle, centered on you, with a radius of 400 ft. + 40 ft./level
    duracion: 1 min./level
    cancelable: false
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: You sense the direction of a well-known or clearly visualized object.
      You can search for general items, in which case you locate the nearest of its
      kind if more than one is within range. Attempting to find a certain item requires
      a specific and accurate mental image; if the image is not close enough to the
      actual object, the spell fails. You cannot specify a unique item unless you
      have observed that particular item firsthand (not through divination). The spell
      is blocked by even a thin sheet of lead. Creatures cannot be found by this spell.
      Polymorph any object and nondetection fool it.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Minor Image
    alias_en_ingles: Minor Image
    nivel: 2
    escuela: Ilusión
