  - nombre: Confusion
    alias_en_ingles: Confusion
    nivel: 4
    escuela: Encantamiento
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M/DF (three nutshells)
      materiales:
    alcance: medium (100 ft. + 10 ft./level)
    objetivo: all creatures in a 15-ft.-radius burst
    efecto:
    area:
    duracion: 1 round/level
    cancelable: false
    tirada_de_salvacion: Will negates
    resistencia_a_conjuros: sí
    descripcion: This spell causes confusion in the targets, making them unable to
      determine their actions. Roll on the following table at the start of each subject's
      turn each round to see what it does in that round. d% Behavior 01-25 Act normally
      26-50 Do nothing but babble incoherently 51-75 Deal 1d8 points of damage + Str
      modifier to self with item in hand 76-100 Attack nearest creature (for this
      purpose, a familiar counts as part of the subject's self) A confused character
      who can't carry out the indicated action does nothing but babble incoherently.
      Attackers are not at any special advantage when attacking a confused character.
      Any confused character who is attacked automatically attacks its attackers on
      its next turn, as long as it is still confused when its turn comes. Note that
      a confused character will not make attacks of opportunity against any creature
      that it is not already devoted to attacking (either because of its most recent
      action or because it has just been attacked).
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Dimension Door
    alias_en_ingles: Dimension Door
    nivel: 4
    escuela: Conjuración
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V
      materiales:
    alcance: long (400 ft. + 40 ft./level)
    objetivo: you and touched objects or other touched willing creatures
    efecto:
    area:
    duracion: instantaneous
    cancelable: false
    tirada_de_salvacion: none and Will negates (object)
    resistencia_a_conjuros: and yes (object)
    descripcion: You instantly transfer yourself from your current location to any
      other spot within range. You always arrive at exactly the spot desired--whether
      by simply visualizing the area or by stating direction. After using this spell,
      you can't take any other actions until your next turn. You can bring along objects
      as long as their weight doesn't exceed your maximum load. You may also bring
      one additional willing Medium or smaller creature (carrying gear or objects
      up to its maximum load) or its equivalent per three caster levels. A Large creature
      counts as two Medium creatures, a Huge creature counts as two Large creatures,
      and so forth. All creatures to be transported must be in contact with one another,
      and at least one of those creatures must be in contact with you. If you arrive
      in a place that is already occupied by a solid body, you and each creature traveling
      with you take 1d6 points of damage and are shunted to a random open space on
      a suitable surface within 100 feet of the intended location. If there is no
      free space within 100 feet, you and each creature traveling with you take an
      additional 2d6 points of damage and are shunted to a free space within 1,000
      feet. If there is no free space within 1,000 feet, you and each creature travelling
      with you take an additional 4d6 points of damage and the spell simply fails.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Dimensional Anchor
    alias_en_ingles: Dimensional Anchor
    nivel: 4
    escuela: Abjuración
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S
      materiales:
    alcance: medium (100 ft. + 10 ft./level)
    objetivo:
    efecto: ray
    area:
    duracion: 1 min./level
    cancelable: false
    tirada_de_salvacion: none
    resistencia_a_conjuros: yes (object)
    descripcion: A green ray springs from your hand. You must make a ranged touch
      attack to hit the target. Any creature or object struck by the ray is covered
      with a shimmering emerald field that completely blocks extradimensional travel.
      Forms of movement barred by a dimensional anchor include astral projection,
      blink, dimension door, ethereal jaunt, etherealness, gate, maze, plane shift,
      shadow walk, teleport, and similar spell-like abilities. The spell also prevents
      the use of a gate or teleportation circle for the duration of the spell. A dimensional
      anchor does not interfere with the movement of creatures already in ethereal
      or astral form when the spell is cast, nor does it block extradimensional perception
      or attack forms. Also, dimensional anchor does not prevent summoned creatures
      from disappearing at the end of a summoning spell.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Enervation
    alias_en_ingles: Enervation
    nivel: 4
    escuela: Nigromancia
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S
      materiales:
    alcance: close (25 ft. + 5 ft./2 levels)
    objetivo:
    efecto: ray of negative energy
    area:
    duracion: instantaneous
    cancelable: false
    tirada_de_salvacion: none
    resistencia_a_conjuros: sí
    descripcion: You point your finger and fire a black ray of negative energy that
      suppresses the life force of any living creature it strikes. You must make a
      ranged touch attack to hit. If you hit, the subject gains 1d4 temporary negative
      levels (see Appendix 1). Negative levels stack. Assuming the subject survives,
      it regains lost levels after a number of hours equal to your caster level (maximum
      15 hours). Usually, negative levels have a chance of becoming permanent, but
      the negative levels from enervation don't last long enough to do so. An undead
      creature struck by the ray gains 1d4 x 5 temporary hit points for 1 hour.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
