  - nombre: Detectar pensamientos
    alias_en_ingles: Detect Thoughts
    nivel: 2
    escuela: Adivinación
    subescuela:
    descriptores:
    - enajenador
    tiempo_de_lanzamiento: 1 acción estándar
    componentes:
      abreviatura: V, S, F/DF
