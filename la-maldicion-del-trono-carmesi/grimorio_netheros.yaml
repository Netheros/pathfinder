      pagina: 285
    verificacion:
      estado: verificado_pdf_local
  - nombre: Enlarge Person
    alias_en_ingles: Enlarge Person
    nivel: 1
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 round
    componentes:
      abreviatura: V, S, M (powdered iron)
      materiales:
    alcance: close (25 ft. + 5 ft./2 levels)
    objetivo: one humanoid creature
    efecto:
    area:
    duracion: 1 min./level (D)
    cancelable: true
    tirada_de_salvacion: Fortitude negates
    resistencia_a_conjuros: sí
    descripcion: This spell causes instant growth of a humanoid creature, doubling
      its height and multiplying its weight by 8. This increase changes the creature's
      size category to the next larger one. The target gains a +2 size bonus to Strength,
      a -2 size penalty to Dexterity (to a minimum of 1), and a -1 penalty on attack
      rolls and AC due to its increased size. A humanoid creature whose size increases
      to Large has a space of 10 feet and a natural reach of 10 feet. This spell does
      not change the target's speed. If insufficient room is available for the desired
      growth, the creature attains the maximum possible size and may make a Strength
      check (using its increased Strength) to burst any enclosures in the process.
      If it fails, it is constrained without harm by the materials enclosing it-the
      spell cannot be used to crush a creature by increasing its size. All equipment
      worn or carried by a creature is similarly enlarged by the spell. Melee weapons
      affected by this spell deal more damage (see page 145). Other magical properties
      are not affected by this spell. Any enlarged item that leaves an enlarged creature's
      possession (including a projectile or thrown weapon) instantly returns to its
      normal size. This means that thrown and projectile weapons deal their normal
      damage. Magical properties of enlarged items are not increased by this spell.
      Multiple magical effects that increase size do not stack. Enlarge person counters
      and dispels reduce person. Enlarge person can be made permanent with a permanency
      spell.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Feather Fall
    alias_en_ingles: Feather Fall
    nivel: 1
    escuela: Transmutación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 immediate action
    componentes:
      abreviatura: V
      materiales:
    alcance: close (25 ft. + 5 ft./2 levels)
    objetivo: one Medium or smaller freefalling object or creature/level, no two of
      which may be more than 20 ft. apart
    efecto:
    area:
    duracion: until landing or 1 round/level
    cancelable: false
    tirada_de_salvacion: Will negates (harmless) or Will negates (object)
    resistencia_a_conjuros: yes (object)
    descripcion: 'The affected creatures or objects fall slowly. Feather fall instantly
      changes the rate at which the targets fall to a mere 60 feet per round (equivalent
      to the end of a fall from a few feet), and the subjects take no damage upon
      landing while the spell is in effect. When the spell duration expires, a normal
      rate of falling resumes. The spell affects one or more Medium or smaller creatures
      (including gear and carried objects up to each creature''s maximum load) or
      objects, or the equivalent in larger creatures: a Large creature or object counts
      as two Medium creatures or objects, a Huge creature or object counts as four
      Medium creatures or objects, and so forth. This spell has no special effect
      on ranged weapons unless they are falling quite a distance. If the spell is
      cast on a falling item, the object does half normal damage based on its weight,
      with no bonus for the height of the drop. Feather fall works only upon free-falling
      objects. It does not affect a sword blow or a charging or flying creature.'
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Floating Disk
    alias_en_ingles: Floating Disk
    nivel: 1
    escuela: Evocación
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M (a drop of mercury)
      materiales:
    alcance: close (25 ft. + 5 ft./2 levels)
    objetivo:
    efecto: 3-ft.-diameter disk of force
    area:
    duracion: 1 hour/level
    cancelable: false
    tirada_de_salvacion: none
    resistencia_a_conjuros:
    descripcion: You create a slightly concave, circular plane of force that follows
      you about and carries loads for you. The disk is 3 feet in diameter and 1 inch
      deep at its center. It can hold 100 pounds of weight per caster level. If used
      to transport a liquid, its capacity is 2 gallons. The disk floats approximately
      3 feet above the ground at all times and remains level. It floats along horizontally
      within spell range and will accompany you at a rate of no more than your normal
      speed each round. If not otherwise directed, it maintains a constant interval
      of 5 feet between itself and you. The disk winks out of existence when the spell
      duration expires. The disk also winks out if you move beyond its range or try
      to take the disk more than 3 feet away from the surface beneath it. When the
      disk winks out, whatever it was supporting falls to the surface beneath it.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Grease
    alias_en_ingles: Grease
    nivel: 1
    escuela: Conjuración
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 standard action
    componentes:
      abreviatura: V, S, M (butter)
      materiales:
    alcance: close (25 ft. + 5 ft./2 levels)
    objetivo: one object or 10-ft. square
    efecto:
    area:
    duracion: 1 min./level (D)
    cancelable: true
    tirada_de_salvacion: see text
    resistencia_a_conjuros:
    descripcion: A grease spell covers a solid surface with a layer of slippery grease.
      Any creature in the area when the spell is cast must make a successful Reflex
      save or fall. A creature can walk within or through the area of grease at half
      normal speed with a DC 10 Acrobatics check. Failure means it can't move that
      round (and must then make a Reflex save or fall), while failure by 5 or more
      means it falls (see the Acrobatics skill for details). Creatures that do not
      move on their turn do not need to make this check and are not considered flat-footed.
      The spell can also be used to create a greasy coating on an item. Material objects
      not in use are always affected by this spell, while an object wielded or employed
      by a creature requires its bearer to make a Reflex saving throw to avoid the
      effect. If the initial saving throw fails, the creature immediately drops the
      item. A saving throw must be made in each round that the creature attempts to
      pick up or use the greased item. A creature wearing greased armor or clothing
      gains a +10 circumstance bonus on Escape Artist checks and combat maneuver checks
      made to escape a grapple, and to their CMD to avoid being grappled.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
  - nombre: Hypnotism
    alias_en_ingles: Hypnotism
    nivel: 1
    escuela: Encantamiento
    subescuela:
    descriptores: []
    tiempo_de_lanzamiento: 1 round
    componentes:
      abreviatura: V, S
      materiales:
    alcance: close (25 ft. + 5 ft./2 levels)
    objetivo:
    efecto:
    area: several living creatures, no two of which may be more than 30 ft. apart
    duracion: 2d4 rounds
    cancelable: true
    tirada_de_salvacion: Will negates
    resistencia_a_conjuros: sí
    descripcion: Your gestures and droning incantation fascinate nearby creatures,
      causing them to stop and stare blankly at you. In addition, you can use their
      rapt attention to make your suggestions and requests seem more plausible. Roll
      2d4 to see how many total HD of creatures you affect. Creatures with fewer HD
      are affected before creatures with more HD. Only creatures that can see or hear
      you are affected, but they do not need to understand you to be fascinated. If
      you use this spell in combat, each target gains a +2 bonus on its saving throw.
      If the spell affects only a single creature not in combat at the time, the saving
      throw has a penalty of -2. While the subject is fascinated by this spell, it
      reacts as though it were two steps more friendly in attitude. This allows you
      to make a single request of the affected creature (provided you can communicate
      with it). The request must be brief and reasonable. Even after the spell ends,
      the creature retains its new attitude toward you, but only with respect to that
      particular request. A creature that fails its saving throw does not remember
      that you enspelled it.
    fuente:
      libro: Reglamento básico
      pagina:
    verificacion:
      estado: pendiente
